<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Readiness Assessment</title>
<style>
  :root{
    --ink:#43224d; --signal:#e0044e; --paper:#f7f6f8; --surface:#fff;
    --line:#e7e3ec; --hair:#efedf2; --muted:#736a79; --soft:#9a91a1; --text:#23202a;
    --cleared:#1f7a5c; --blocked:#c07a1c;
    --ink-06:rgba(67,34,77,.06); --ink-10:rgba(67,34,77,.10);
    --radius:12px;
    --mono:ui-monospace,"SF Mono","Cascadia Code","Roboto Mono",Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:var(--sans);color:var(--text);background:var(--paper);line-height:1.6;-webkit-font-smoothing:antialiased}
  .eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--soft);font-weight:600}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}

  .term{border-bottom:1px dashed var(--soft);cursor:help;position:relative;outline:none}
  .term:hover,.term:focus{color:var(--ink);border-bottom-color:var(--ink)}
  .term::after{content:attr(data-tip);position:absolute;left:0;bottom:calc(100% + 9px);width:min(260px,72vw);background:var(--ink);color:#fff;font-size:12.5px;font-weight:400;line-height:1.5;padding:11px 13px;border-radius:10px;opacity:0;visibility:hidden;transition:opacity .12s;z-index:40;box-shadow:0 10px 30px rgba(42,24,48,.28);pointer-events:none;text-transform:none;letter-spacing:normal}
  .term::before{content:"";position:absolute;left:16px;bottom:calc(100% + 3px);border:6px solid transparent;border-top-color:var(--ink);opacity:0;visibility:hidden;transition:opacity .12s;z-index:40}
  .term:hover::after,.term:focus::after,.term:hover::before,.term:focus::before{opacity:1;visibility:visible}

  /* shell */
  header.top{border-bottom:1px solid var(--line);background:var(--surface)}
  .top-inner{max-width:min(1720px,96vw);margin:0 auto;padding:18px 40px;display:flex;align-items:center;justify-content:space-between;gap:16px}
  .brand{display:flex;align-items:baseline;gap:14px}
  .brand .mark{font-weight:800;letter-spacing:-.01em;color:var(--ink);font-size:18px}
  .markbtn{background:none;border:none;padding:0;cursor:pointer;font-family:var(--sans)}
  .markbtn:hover{text-decoration:underline;text-underline-offset:3px}
  .hdr-right{display:flex;align-items:center;gap:22px}
  .hdr-logo{font-size:19px;font-weight:800;color:var(--ink);letter-spacing:-.035em;font-family:var(--sans);white-space:nowrap}
  .brand .mark span{color:var(--signal)}
  .brand .tool{font-size:12.5px;color:var(--muted);border-left:1px solid var(--line);padding-left:14px}

  .app-body{max-width:min(1720px,96vw);margin:0 auto;display:flex;align-items:flex-start}

  /* left sidebar */
  .sidebar{width:250px;flex-shrink:0;position:sticky;top:0;align-self:flex-start;padding:26px 16px 40px;border-right:1px solid var(--line)}
  .side-sel{padding:0 8px 20px;margin-bottom:14px;border-bottom:1px solid var(--hair)}
  .side-sel label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--soft);font-weight:700;margin-bottom:7px}
  .side-sel select{width:100%;font-family:var(--sans);font-size:13.5px;font-weight:600;color:var(--text);background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:10px 11px;cursor:pointer}
  .side-nav{display:flex;flex-direction:column;gap:2px}
  .side-grp{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--soft);font-weight:700;margin:16px 10px 8px}
  .side-item{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:none;border:none;cursor:pointer;padding:9px 10px;border-radius:9px;font-family:var(--sans);transition:background .12s}
  .side-item:hover{background:var(--ink-06)}
  .side-item:focus-visible{outline:2px solid var(--ink);outline-offset:-2px}
  .side-item.on{background:var(--ink-06)}
  .side-item .si-n{width:24px;height:24px;border-radius:50%;border:1px solid var(--line);background:var(--surface);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;font-weight:600;color:var(--soft);flex-shrink:0}
  .side-item.on .si-n{background:var(--signal);color:#fff;border-color:var(--signal)}
  .side-item .si-n.done{background:var(--ink);color:#fff;border-color:var(--ink)}
  .side-item .si-ic{width:24px;height:24px;color:var(--soft);flex-shrink:0;display:flex;align-items:center;justify-content:center}
  .side-item .si-ic svg{width:17px;height:17px}
  .side-item.on .si-ic{color:var(--signal)}
  .side-item .si-l{display:flex;flex-direction:column;min-width:0;flex:1}
  .side-item .si-l b{font-size:13px;font-weight:600;color:var(--text);line-height:1.25}
  .side-item.on .si-l b{color:var(--ink)}
  .side-item .si-l span{font-size:11px;color:var(--soft);margin-top:1px}
  .side-item.lite{margin-bottom:2px}
  .si-ct{font-family:var(--mono);font-size:10px;color:var(--muted);background:var(--surface);border:1px solid var(--line);border-radius:7px;padding:1px 6px;flex-shrink:0}

  .main-area{flex:1;min-width:0}
  .workspace{display:flex;gap:52px;padding:34px 40px 64px;align-items:flex-start}
  .work-left{flex:1.04;min-width:0}
  .work-right{flex:0.96;min-width:0;position:sticky;top:20px}
  .howworks{padding:40px 44px 72px}

  /* live view pane */
  .live-eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--soft);font-weight:700;margin-bottom:16px}
  .live-hero{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:28px;margin-bottom:16px}
  .live-hero svg{width:100%;height:auto;display:block}
  .live-hero.center{text-align:center;padding:40px 28px}
  .live-hero.center svg{max-width:240px;margin:0 auto}
  .live-cap{font-size:13.5px;color:var(--muted);line-height:1.6;margin-top:20px;max-width:40ch;margin-left:auto;margin-right:auto}
  .live-cap b{color:var(--ink)}
  .live-read{font-size:14px;color:var(--muted);line-height:1.62;margin:18px 0 0}
  .live-read b{color:var(--ink);font-weight:700}
  .live-stats{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:12px;margin-bottom:16px}
  .live-stats>.lstat:nth-child(1){border-top-left-radius:11px}
  .live-stats>.lstat:nth-child(2){border-top-right-radius:11px}
  .live-stats>.lstat:nth-child(3):nth-last-child(2){border-bottom-left-radius:11px}
  .live-stats>.lstat:nth-child(4):nth-last-child(1){border-bottom-right-radius:11px}
  .live-stats>.lstat.fix{border-bottom-left-radius:11px;border-bottom-right-radius:11px}
  .lstat{background:var(--surface);padding:15px 17px;display:flex;flex-direction:column;gap:4px}
  .lstat span:first-child{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
  .lstat span:last-child{font-family:var(--mono);font-size:19px;font-weight:700;color:var(--ink)}
  .lstat span.sig{color:var(--signal)}
  .live-note{font-size:11.5px;color:var(--soft);text-align:center;margin:-6px 0 16px;font-style:italic}
  .lstat.fix{grid-column:1/-1;background:var(--ink)}
  .lstat.fix span:first-child{color:rgba(255,255,255,.6)}
  .lstat.fix span:last-child{color:#ff7aa6}
  .live-help{font-size:12.5px;color:var(--muted);line-height:1.6;padding:16px 18px;background:var(--ink-06);border-radius:12px}
  .live-help b{color:var(--ink);display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}

  .oppguide{margin-bottom:30px}
  .oppguide .legend{flex-direction:row;flex-wrap:wrap;gap:18px;margin-bottom:16px}

  main.work-left{}

  .stage{animation:fade .28s ease}
  @keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

  /* editorial lede */
  .lede{max-width:60ch;margin-bottom:34px}
  .lede h1{font-size:27px;line-height:1.2;letter-spacing:-.015em;color:var(--ink);margin:10px 0 14px;font-weight:700}
  .lede p{margin:0;font-size:15.5px;color:var(--text);line-height:1.62}
  .who{margin-top:14px;font-size:12.5px;color:var(--muted);display:flex;align-items:center;gap:8px}
  .who::before{content:"";width:16px;height:1px;background:var(--soft);display:inline-block}

  .section-label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--soft);font-weight:700;margin:0 0 16px}
  .lbl-help{cursor:help}
  .lbl-i{display:inline-block;width:13px;height:13px;margin-left:6px;vertical-align:-2px;color:var(--soft);flex-shrink:0}
  .qnote{width:100%;margin-top:6px;font-family:var(--sans);font-size:11px;color:var(--text);background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:5px 9px}
  .qnote::placeholder{color:var(--soft)}
  .qnote:focus{outline:1.5px solid var(--ink);outline-offset:-1px;border-color:var(--ink);background:var(--surface)}
  .qnote.has{border-color:var(--soft);background:var(--surface)}
  .fx-gaps li .fx-why{display:block;font-size:11px;color:var(--muted);font-style:italic;margin-top:2px;line-height:1.4}
  .lbl-help:hover .lbl-i{border-color:var(--signal);color:var(--signal)}
  .scope-actions{display:inline-flex;gap:8px;margin-left:16px;text-transform:none;letter-spacing:0}
  .scope-act{background:none;border:1px solid var(--line);border-radius:6px;padding:3px 10px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;font-family:var(--sans)}
  .scope-act:hover{border-color:var(--ink);color:var(--ink)}
  .lbl-help[data-help]:hover::after,.lbl-help[data-help]:focus-visible::after{max-width:300px}

  /* scope chips */
  .chips{display:flex;flex-wrap:wrap;gap:9px}
  .chip{font-size:13px;font-weight:500;padding:9px 15px;border-radius:22px;cursor:pointer;border:1px solid var(--line);background:var(--surface);color:var(--muted);display:flex;align-items:center;gap:8px;user-select:none;transition:all .12s}
  .chip .dot{width:7px;height:7px;border-radius:50%;background:var(--line)}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink);font-weight:600}
  .chip.on .dot{background:var(--signal)}
  .chip:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
  .hint{font-size:13px;color:var(--muted);margin-top:18px;line-height:1.55;max-width:58ch}

  /* foundations (readiness) */
  .foundations{display:flex;flex-direction:column;gap:0;border-top:1px solid var(--hair)}
  .fnd{border-bottom:1px solid var(--hair)}
  .fnd-head{width:100%;display:flex;align-items:center;gap:16px;padding:18px 4px;background:none;border:none;cursor:pointer;text-align:left;font-family:var(--sans)}
  .fnd-head:hover .fnd-name{color:var(--ink)}
  .fnd-head:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
  .fnd-idx{font-family:var(--mono);font-size:12px;color:var(--soft);width:18px;flex-shrink:0}
  .fnd-main{flex:1;min-width:0}
  .fnd-name{font-size:15px;font-weight:600;color:var(--text);transition:color .12s}
  .fnd-role{font-size:12.5px;color:var(--muted);margin-left:9px}
  .fnd-state{display:flex;align-items:center;gap:14px;flex-shrink:0}
  .badge{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;padding:4px 9px;border-radius:20px;white-space:nowrap}
  .badge.ok{background:rgba(31,122,92,.1);color:var(--cleared)}
  .badge.ind{background:rgba(192,122,28,.13);color:var(--blocked)}
  .badge.notset{background:var(--ink-06);color:var(--soft)}
  .fnd-lvl{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--ink);width:34px;text-align:right}
  .fnd-lvl.empty{color:var(--soft);font-weight:400}
  .chev{color:var(--soft);font-size:11px;transition:transform .18s;width:11px}
  .fnd.open .chev{transform:rotate(90deg)}
  .fnd-body{padding:4px 4px 26px 38px;display:grid;grid-template-columns:1fr 1.15fr;gap:34px}
  .fnd-body .col-h{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--soft);font-weight:700;margin-bottom:12px}
  .artefact{display:flex;align-items:flex-start;gap:10px;padding:7px 0;font-size:13.5px;cursor:pointer;line-height:1.45}
  .artefact input{accent-color:var(--ink);width:16px;height:16px;margin-top:1px;cursor:pointer;flex-shrink:0}
  .lvlrow{display:flex;gap:12px;align-items:flex-start;padding:10px 12px;border:1px solid var(--line);border-radius:9px;margin-bottom:7px;cursor:pointer;font-size:13.5px;line-height:1.4;transition:all .12s}
  .lvlrow:hover{border-color:var(--soft)}
  .lvlrow:focus-visible{outline:2px solid var(--ink);outline-offset:1px}
  .lvlrow.sel{border-color:var(--ink);background:var(--ink-06)}
  .lvlrow .ln{font-family:var(--mono);font-weight:700;color:var(--soft);flex-shrink:0}
  .lvlrow.sel .ln{color:var(--signal)}
  .guard{grid-column:1/-1;display:flex;gap:10px;margin-top:6px;font-size:13px;padding:12px 14px;border-radius:9px;background:rgba(192,122,28,.08);border:1px solid rgba(192,122,28,.24);color:#7a4d10;line-height:1.5}
  .guard b{color:var(--blocked)}

  .notes{margin-top:34px;border-top:1px solid var(--hair);padding-top:26px}
  .flag{display:flex;gap:11px;align-items:flex-start;font-size:13.5px;padding:2px 0 12px;line-height:1.5}
  .flag .fi{color:var(--signal);font-weight:800;font-family:var(--mono);flex-shrink:0}
  .flag b{color:var(--ink)}
  .flags-empty{font-size:13.5px;color:var(--muted)}

  /* opportunity */
  .filterbar{display:flex;align-items:center;gap:16px;margin-bottom:18px;flex-wrap:wrap}
  .toggle{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted)}
  .switch{width:38px;height:22px;border-radius:12px;background:var(--line);position:relative;transition:background .15s}
  .switch::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .15s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
  .toggle.on{color:var(--text)}
  .toggle.on .switch{background:var(--ink)}
  .toggle.on .switch::after{transform:translateX(16px)}
  .count-note{font-size:12.5px;color:var(--muted)}
  .count-note b{color:var(--ink);font-family:var(--mono)}
  table.opps{width:100%;border-collapse:collapse;font-size:13.5px}
  table.opps th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--soft);font-weight:700;padding:0 12px 12px;border-bottom:1px solid var(--line)}
  table.opps td{padding:13px 12px;border-bottom:1px solid var(--hair);vertical-align:middle}
  table.opps tr.dim td{opacity:.5}
  .arch{font-size:12px;color:var(--muted)}
  .fit{font-weight:600;font-size:12.5px}
  .fit.H{color:var(--cleared)} .fit.M{color:var(--blocked)} .fit.L{color:var(--soft)}
  .status{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
  .status.ok{color:var(--cleared)} .status.no{color:var(--signal)} .status.pend{color:var(--soft)}
  .ve{font-family:var(--mono);font-size:12.5px;white-space:nowrap}
  .adjust{display:inline-flex;align-items:center;gap:6px}
  .adjust button{width:20px;height:20px;border:1px solid var(--line);background:var(--surface);border-radius:6px;cursor:pointer;font-family:var(--mono);line-height:1;color:var(--ink);padding:0}
  .adjust button:hover{background:var(--ink-06)}
  .adjust .sv{font-family:var(--mono);font-size:12.5px;min-width:16px;text-align:center}

  .matrix-block{margin-top:38px;border-top:1px solid var(--hair);padding-top:28px}
  .matrix-wrap{display:grid;grid-template-columns:1.25fr 1fr;gap:28px;align-items:center}
  .legend{display:flex;flex-direction:column;gap:13px;font-size:13px}
  .legend .lg{display:flex;gap:10px;align-items:center}
  .legend .sw{width:13px;height:13px;border-radius:50%;flex-shrink:0}
  .sw.solid{background:var(--ink)} .sw.hollow{background:#fff;border:1.5px solid var(--blocked)} .sw.pend{background:var(--line)}
  .quad-note{font-size:12.5px;color:var(--muted);border-top:1px solid var(--hair);padding-top:14px;margin-top:6px;line-height:1.55}

  /* gap */
  .gap-list{display:flex;flex-direction:column;gap:12px}
  .gap-item{border:1px solid var(--line);border-left:3px solid var(--signal);border-radius:10px;padding:15px 17px}
  .gap-item .gi-top{display:flex;justify-content:space-between;align-items:baseline;gap:12px}
  .gap-item .gi-name{font-weight:600;font-size:14.5px;color:var(--ink)}
  .gap-item .gi-val{font-family:var(--mono);font-size:12px;color:var(--soft)}
  .gap-item .gi-why{font-size:13px;color:var(--muted);margin-top:5px;line-height:1.5}
  .verdict{background:var(--ink);color:#fff;border-radius:var(--radius);padding:24px 26px;margin-top:22px}
  .verdict .eyebrow{color:rgba(255,255,255,.55)}
  .verdict p{margin:10px 0 0;font-size:16px;line-height:1.55}
  .verdict b{color:#fff}
  .verdict .hl{color:#ff7aa6;font-weight:700}

  /* roadmap */
  .lanes{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  .lane{border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:var(--surface)}
  .lane .lh{padding:15px 17px;border-bottom:1px solid var(--hair)}
  .lane .lh .t{font-size:13px;font-weight:700;color:var(--ink)}
  .lane .lh .s{font-size:11.5px;color:var(--muted);margin-top:2px}
  .lane.now .lh{border-top:3px solid var(--cleared)}
  .lane.next .lh{border-top:3px solid var(--signal)}
  .lane.later .lh{border-top:3px solid var(--ink)}
  .lane ul{list-style:none;margin:0;padding:8px 17px 16px}
  .lane li{font-size:13px;padding:9px 0;border-bottom:1px solid var(--hair);display:flex;justify-content:space-between;gap:10px;line-height:1.4}
  .lane li:last-child{border-bottom:none}
  .lane li .li-v{font-family:var(--mono);font-size:11px;color:var(--soft);flex-shrink:0}
  .lane li.empty{color:var(--soft);font-style:italic}
  .startover{margin-top:30px;border-top:1px solid var(--hair);padding-top:22px;font-size:13px;color:var(--muted)}
  button.reset{font-size:13px;color:var(--ink);cursor:pointer;text-decoration:underline;background:none;border:none;font-family:var(--sans);padding:0;margin-top:6px}

  .prompt{font-size:14.5px;color:var(--muted);background:var(--ink-06);border-radius:var(--radius);padding:20px 22px;line-height:1.55;max-width:58ch}
  .prompt b{color:var(--ink)}
  .backcue{margin-top:26px}
  .backcue-btn{font-size:13px;color:var(--ink);cursor:pointer;text-decoration:underline;background:none;border:none;font-family:var(--sans);padding:0}

  /* summary panel */
  .sum{position:relative}
  .sum-eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--soft);font-weight:700;margin-bottom:18px}
  .sum-hero{text-align:left;padding-bottom:22px;border-bottom:1px solid var(--hair);margin-bottom:20px}
  .sum-num{font-family:var(--mono);font-size:52px;font-weight:700;line-height:1;color:var(--signal)}
  .sum-num.empty{color:var(--line)}
  .sum-num span{font-size:20px;color:var(--soft);font-weight:400}
  .sum-cap{font-size:13px;font-weight:600;color:var(--ink);margin-top:10px}
  .sum-sub{font-size:12.5px;color:var(--muted);margin-top:3px;line-height:1.45}
  .sum-rows{display:flex;flex-direction:column;gap:0}
  .sum-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--hair);font-size:13px}
  .sum-row:last-child{border-bottom:none}
  .sum-row .k{color:var(--muted)}
  .sum-row .val{font-family:var(--mono);font-weight:700;color:var(--text)}
  .sum-row.fix{margin-top:14px;padding:13px 14px;background:var(--ink);border-radius:10px;border:none}
  .sum-row.fix .k{color:rgba(255,255,255,.6)}
  .sum-row.fix .val{color:#ff7aa6}
  .sum-note{font-size:12px;color:var(--soft);line-height:1.55;margin-top:22px}

  /* visual components */
  .tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .tile{display:flex;flex-direction:column;align-items:flex-start;gap:11px;padding:17px 16px 15px;border:1px solid var(--line);border-radius:12px;background:var(--surface);cursor:pointer;text-align:left;transition:all .14s;color:var(--muted)}
  .tile:hover{border-color:var(--soft)}
  .tile:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
  .tile.on{border-color:var(--ink);background:#fff;box-shadow:0 3px 14px rgba(67,34,77,.08)}
  .tile-ic{width:26px;height:26px;color:var(--soft)}
  .tile.on .tile-ic{color:var(--signal)}
  .tile-ic svg{width:100%;height:100%;display:block}
  .tile-n{font-size:13.5px;font-weight:600;color:var(--text);line-height:1.25}
  .tile-c{font-size:11.5px;color:var(--soft);font-family:var(--mono)}

  .rad-hero{display:grid;grid-template-columns:1fr 1fr;gap:34px;align-items:center;margin-bottom:38px;padding-bottom:34px;border-bottom:1px solid var(--hair)}
  .rad-vis svg{width:100%;height:auto;display:block}
  .reading{font-size:15px;line-height:1.62;color:var(--text);margin:0}
  .reading b{color:var(--ink);font-weight:700}

  .sum-gauge{margin-bottom:2px}
  .sum-gauge svg{width:150px;height:auto;display:block}

  .opp-hero{display:grid;grid-template-columns:1.2fr 1fr;gap:30px;align-items:center;margin-bottom:38px;padding-bottom:32px;border-bottom:1px solid var(--hair)}
  .opp-hero svg{width:100%;height:auto;display:block}

  .gapbars{display:flex;flex-direction:column;gap:14px;margin-bottom:6px}
  .gapbar{display:grid;grid-template-columns:186px 1fr 34px;align-items:center;gap:16px}
  .gbl{font-size:13.5px;font-weight:600;color:var(--text);display:flex;flex-direction:column;line-height:1.3}
  .gbn{font-size:11px;color:var(--soft);font-weight:400;margin-top:2px}
  .gbtrack{height:32px;background:var(--ink-06);border-radius:9px;overflow:hidden}
  .gbfill{height:100%;background:var(--ink-10);border-radius:9px;display:flex;align-items:center;justify-content:flex-end;transition:width .4s ease;min-width:9%}
  .gbfill.top{background:var(--signal)}
  .gbfill span{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#fff;padding-right:12px}
  .gbv{font-family:var(--mono);font-weight:700;font-size:16px;color:var(--ink);text-align:right}

  .timeline{margin-bottom:26px}
  .timeline svg{width:100%;height:auto;max-height:110px;display:block}

  /* explanatory scaffolding */
  .guide{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:22px 24px;margin-top:32px}
  .guide h4{font-size:11.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink);margin:0 0 15px;font-weight:700;display:flex;align-items:center;gap:9px}
  .guide h4::before{content:"";width:14px;height:14px;border-radius:50%;border:2px solid var(--signal);flex-shrink:0}
  .guide p{margin:0 0 12px;font-size:14px;color:var(--text);line-height:1.62;max-width:64ch}
  .guide p:last-child{margin-bottom:0}
  .guide-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:13px}
  .guide-list li{display:flex;gap:12px;font-size:13.5px;line-height:1.55;color:var(--text)}
  .guide-list li .gi{font-family:var(--mono);font-weight:700;color:var(--signal);flex-shrink:0;min-width:16px}
  .guide-list li b{color:var(--ink)}
  .steps-ov{list-style:none;counter-reset:s;margin:0;padding:0;display:flex;flex-direction:column;gap:14px}
  .steps-ov li{counter-increment:s;display:flex;gap:14px;font-size:14px;line-height:1.5;color:var(--muted);align-items:baseline}
  .steps-ov li::before{content:counter(s);font-family:var(--mono);font-weight:700;color:var(--signal);background:var(--ink-06);width:27px;height:27px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;align-self:flex-start}
  .steps-ov li b{color:var(--ink);font-weight:600}
  .quadguide{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:16px}
  .qg{border:1px solid var(--line);border-radius:10px;padding:13px 15px}
  .qg.sweet{border-color:var(--cleared);background:rgba(31,122,92,.05)}
  .qg .qt{font-size:12.5px;font-weight:700;color:var(--ink);margin-bottom:4px}
  .qg .qd{font-size:12px;color:var(--muted);line-height:1.45}
  .sum-help{margin-top:24px;padding-top:20px;border-top:1px solid var(--hair);font-size:12.5px;color:var(--muted);line-height:1.6}
  .sum-help b{color:var(--ink);display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}

  /* how it works */
  .hw-head{margin-bottom:36px}
  .hw-head h1{font-size:28px;line-height:1.2;letter-spacing:-.015em;color:var(--ink);margin:10px 0 14px;font-weight:700}
  .hw-head p{margin:0;font-size:15.5px;color:var(--muted);line-height:1.62;max-width:80ch}
  .hw-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:30px 46px;align-items:start}
  .hw-method{background:var(--ink-06);border-radius:16px;padding:26px 30px;margin-bottom:34px}
  .hw-method-h{margin-bottom:18px}
  .hw-method-h h2{font-size:19px;color:var(--ink);margin:6px 0 0;font-weight:700}
  .hw-method-cols{display:grid;grid-template-columns:1fr 1fr;gap:32px;margin-bottom:18px}
  .hw-mcol h4{font-size:13.5px;color:var(--ink);margin:0 0 8px;font-weight:700}
  .hw-mcol p{font-size:13.5px;color:var(--text);line-height:1.6;margin:0}
  .hw-mcol p b,.hw-worked b{color:var(--ink);font-weight:700}
  .hw-worked{font-size:13px;color:var(--text);line-height:1.6;background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--signal);border-radius:8px;padding:14px 16px}
  .hw-worked-tag{display:inline-block;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--signal);font-weight:700;margin-right:9px}
  .hw-sec h4{font-size:12px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink);margin:0 0 10px;font-weight:700}
  .hw-sec p{margin:0;font-size:14.5px;color:var(--text);line-height:1.65}
  .hw-sec p b{color:var(--ink);font-weight:600}
  .hw-steps{grid-column:1/-1;border-top:1px solid var(--hair);padding-top:26px;margin-top:8px}
  .hw-steprow{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-top:8px}
  .hw-stepcard{border:1px solid var(--line);border-radius:12px;padding:16px 17px;display:flex;flex-direction:column;gap:9px}
  .hw-stepcard .hw-num{width:26px;height:26px;border-radius:50%;background:var(--ink-06);color:var(--signal);font-family:var(--mono);font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center}
  .hw-stepcard b{font-size:13.5px;color:var(--ink);font-weight:600;line-height:1.25}
  .hw-stepcard span{font-size:12.5px;color:var(--muted);line-height:1.5}

  /* client name in header */
  .hdr-client{font-size:14px;font-weight:700;color:var(--ink)}
  .hdr-client:not(:empty){border:1px solid var(--line);border-radius:8px;padding:7px 13px;background:var(--paper)}
  /* sidebar name field + export */
  .side-name{width:100%;margin-top:8px;font-family:var(--sans);font-size:12.5px;color:var(--text);background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:9px 11px}
  .side-name::placeholder{color:var(--soft)}
  .side-name:focus{outline:2px solid var(--ink);outline-offset:-1px;border-color:var(--ink)}
  .side-foot{margin-top:20px;padding-top:16px;border-top:1px solid var(--hair)}
  .side-export{display:flex;align-items:center;gap:9px;width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;background:var(--surface);cursor:pointer;font-family:var(--sans);font-size:12.5px;font-weight:600;color:var(--ink);transition:background .12s}
  .side-export:hover{background:var(--ink-06)}
  .side-export svg{width:16px;height:16px;color:var(--signal)}
  .export-hint{font-size:11px;color:var(--soft);line-height:1.5;margin-top:9px}
  .export-locked{font-size:11.5px;color:var(--muted);line-height:1.55;background:var(--ink-06);border-radius:9px;padding:11px 12px}
  .export-locked b{color:var(--ink);display:block;margin-bottom:3px}
  /* scope tile state */
  .tile-state{font-size:11.5px;color:var(--soft);font-family:var(--sans)}
  .tile.on .tile-state{color:var(--cleared);font-weight:600}
  /* priority matrix (opportunity live view) */
  .pm-toplbl{display:flex;justify-content:space-between;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--soft);margin-bottom:8px;padding:0 2px}
  .pm-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .pm-cell{border:1px solid var(--line);border-radius:12px;padding:11px 12px;display:flex;flex-direction:column;min-height:118px;background:var(--surface);min-width:0}
  .live,.live *{overflow-wrap:break-word}
  .pm-cell.quick{background:rgba(31,122,92,.05)}
  .pm-cell.active{box-shadow:inset 0 0 0 1.5px var(--ink);border-color:var(--ink)}
  .pm-cell.quick.active{box-shadow:inset 0 0 0 1.5px var(--cleared);border-color:var(--cleared)}
  .pm-head{background:none;border:none;text-align:left;cursor:pointer;padding:0 0 9px;font-family:var(--sans);display:flex;flex-direction:column;gap:2px}
  .pm-t{display:flex;align-items:center;justify-content:space-between}
  .pm-t b{font-size:12.5px;color:var(--ink)}
  .pm-ct{font-family:var(--mono);font-size:11px;color:var(--muted);background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:0 6px}
  .pm-cap{font-size:10px;color:var(--soft)}
  .pm-list{display:flex;flex-direction:column;gap:2px}
  .pm-item{display:flex;align-items:flex-start;gap:7px;background:none;border:none;text-align:left;cursor:pointer;padding:4px 5px;border-radius:6px;font-family:var(--sans);font-size:11.5px;color:var(--text);width:100%;min-width:0}
  .pm-item:hover{background:var(--ink-06)}
  .pm-item.blocked .pm-nm{color:var(--muted)}
  .pm-nm{flex:1;min-width:0;white-space:normal;overflow-wrap:anywhere;line-height:1.32}
  .pm-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--line);margin-top:4px}
  .pm-item.ready .pm-dot,.pm-dot.ready{background:var(--cleared)}
  .pm-item.blocked .pm-dot,.pm-dot.blocked{background:var(--blocked)}
  .pm-item.pending .pm-dot,.pm-dot.pending{background:var(--line)}
  .pm-empty{font-size:11px;color:var(--soft);font-style:italic;padding:3px 5px}
  .pm-legend{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);margin-top:14px;flex-wrap:wrap}
  .pm-legend .pm-dot{margin:0 2px 0 10px}
  .pm-legend .pm-dot:first-child{margin-left:0}
  /* way forward */
  .wayforward{background:var(--ink);border-radius:14px;padding:20px 24px;margin-bottom:30px}
  .wf-lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.6);font-weight:700;margin-bottom:9px}
  .wayforward p{margin:0;font-size:15px;color:#fff;line-height:1.6}
  .wayforward p b{color:#ff9cbb;font-weight:700}
  .wf-note{display:block;margin-top:10px;font-size:13px;color:rgba(255,255,255,.72);line-height:1.55}

  /* rubric (Data foundation) */
  .rubric-tag{display:inline-block;margin-left:9px;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--signal);background:rgba(224,4,78,.08);border:1px solid rgba(224,4,78,.25);border-radius:6px;padding:1px 7px;vertical-align:middle}
  .fnd-body-full{padding:4px 4px 26px 38px}
  .rubric-intro{font-size:13px;color:var(--muted);line-height:1.6;background:var(--ink-06);border-radius:10px;padding:14px 16px;margin-bottom:22px;max-width:74ch}
  .rubric-intro b{color:var(--ink)}
  .rubric-hovercue{color:var(--signal);font-weight:600}
  /* single-select maturity ladder */
  .rung-list{display:flex;flex-direction:column;gap:5px;margin-bottom:9px}
  .rung{display:flex;align-items:flex-start;gap:11px;width:100%;text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:10px 13px;cursor:pointer;font-family:var(--sans);transition:border-color .12s,background .12s}
  .rung:hover{border-color:var(--soft)}
  .rung-dot{flex-shrink:0;width:18px;height:18px;border-radius:50%;border:2px solid var(--line);background:var(--surface);margin-top:1px;position:relative}
  .rung.passed{opacity:.72}
  .rung.passed .rung-dot{background:var(--soft);border-color:var(--soft)}
  .rung.passed .rung-dot:after{content:"";position:absolute;left:4px;top:1px;width:4px;height:8px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg)}
  .rung.on{border-color:var(--signal);background:rgba(224,4,78,.05)}
  .rung.on .rung-dot{border-color:var(--signal);background:var(--signal)}
  .rung.on .rung-dot:after{content:"";position:absolute;left:4px;top:4px;width:6px;height:6px;border-radius:50%;background:#fff}
  .rung-txt{flex:1;font-size:12.5px;color:var(--text);line-height:1.45}
  .rung.on .rung-txt{color:var(--ink);font-weight:600}
  .rung-lv{flex-shrink:0;font-family:var(--mono);font-size:10.5px;color:var(--soft);padding-top:2px}
  .rung.on .rung-lv{color:var(--signal);font-weight:700}
  /* diagnostic questions */
  .diag-list{display:flex;flex-direction:column;gap:7px;margin-bottom:9px}
  .diag-row{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:10px 13px;border:1px solid var(--line);border-radius:9px;background:var(--surface)}
  .diag-q{font-size:12.5px;color:var(--text);line-height:1.42;flex:1}
  .diag-q[data-help]{cursor:help;text-decoration:underline;text-decoration-style:dotted;text-decoration-color:var(--line);text-underline-offset:3px}
  .diag-q[data-help]:hover{text-decoration-color:var(--soft)}
  .diag-yn{display:flex;gap:3px;flex-shrink:0;background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:2px}
  .diag-btn{border:none;background:none;cursor:pointer;font-family:var(--sans);font-size:11.5px;font-weight:600;color:var(--muted);padding:5px 13px;border-radius:6px;transition:background .12s,color .12s}
  .diag-btn:hover{color:var(--ink)}
  .diag-btn.sel{background:var(--ink);color:#fff}
  .diag-out{font-size:12.5px;color:var(--muted);line-height:1.55;padding:11px 13px;border-radius:9px;background:var(--paper);border:1px solid var(--line);margin-top:9px}
  .diag-out b{color:var(--ink)}
  .diag-out.todo{color:var(--soft);font-style:italic}
  .diag-item{display:flex;flex-direction:column}
  .diag-row.flagged{border-color:rgba(192,122,28,.5)}
  .diag-flag{font-size:11px;color:#a85f17;background:rgba(192,122,28,.08);border:1px solid rgba(192,122,28,.28);border-radius:7px;padding:6px 10px;margin-top:5px;line-height:1.45}
  .facet{margin-bottom:22px;padding-bottom:20px;border-bottom:1px solid var(--hair)}
  .facet-h{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px;gap:12px}
  .facet-name{font-size:13.5px;font-weight:700;color:var(--ink)}
  .facet-lvl{font-size:11.5px;color:var(--muted);font-family:var(--mono);white-space:nowrap}
  .facet-lvl.bind{color:var(--signal);font-weight:700}
  .facet-todo{font-size:11px;color:var(--soft);font-style:italic}
  .facet-levels{display:flex;flex-direction:column;gap:5px}
  .flvl{display:flex;align-items:flex-start;gap:11px;width:100%;text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:9px 12px;cursor:pointer;font-family:var(--sans);font-size:12.5px;color:var(--text);line-height:1.45;transition:border-color .12s,background .12s}
  .flvl:hover{border-color:var(--soft)}
  .flvl .fl-n{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--soft);width:18px;height:18px;border:1px solid var(--line);border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
  .flvl.on{border-color:var(--ink);background:var(--ink-06)}
  .flvl.on .fl-n{background:var(--ink);color:#fff;border-color:var(--ink)}
  .flvl.on.floor{border-color:var(--signal);background:rgba(224,4,78,.05)}
  .flvl.on.floor .fl-n{background:var(--signal);border-color:var(--signal)}
  .facet-note{width:100%;margin-top:9px;font-family:var(--sans);font-size:12px;color:var(--text);background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:8px 11px}
  .facet-note::placeholder{color:var(--soft)}
  .facet-note:focus{outline:1.5px solid var(--ink);outline-offset:-1px;border-color:var(--ink)}
  .rubric-out{font-size:13.5px;color:var(--muted);line-height:1.6;padding:15px 17px;border-radius:10px;background:var(--paper);border:1px solid var(--line)}
  .rubric-out b{color:var(--ink)}
  .rubric-out.done{background:rgba(224,4,78,.05);border-color:rgba(224,4,78,.2)}
  .rubric-out.done b{color:var(--signal)}
  /* how it works visuals */
  .hw-visuals{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:36px}
  .hw-vcard{border:1px solid var(--line);border-radius:14px;background:var(--surface);padding:18px 20px}
  .hw-vcard.hw-vwide{grid-column:1/-1}
  .hw-vlabel{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--soft);font-weight:700;margin-bottom:10px}
  .hw-vcard svg{width:100%;height:auto;display:block}
  /* How it works: single-column narrative */
  .hw-narrative{max-width:800px;margin:0 auto}
  .hw-beat{display:flex;gap:20px;padding:28px 0;border-top:1px solid var(--hair)}
  .hw-beat:first-child{border-top:none;padding-top:6px}
  .hw-beat-n{flex-shrink:0;width:34px;height:34px;border-radius:50%;border:1.5px solid var(--ink);color:var(--ink);font-family:var(--mono);font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:center}
  .hw-beat-b{flex:1;min-width:0}
  .hw-beat-b h3{font-size:18px;color:var(--ink);margin:3px 0 9px;font-weight:700;letter-spacing:-.01em}
  .hw-beat-b p{font-size:14.5px;color:var(--text);line-height:1.66;margin:0}
  .hw-beat-b p b{color:var(--ink)}
  .hw-inline{margin-top:18px}

  /* interactive quadrant filters */
  button.qg{background:var(--surface);cursor:pointer;text-align:left;width:100%;font-family:var(--sans);transition:border-color .12s,box-shadow .12s,background .12s}
  button.qg:hover{border-color:var(--soft)}
  .qg.on{background:var(--ink-06);box-shadow:inset 0 0 0 1.5px var(--ink);border-color:var(--ink)}
  .qg.sweet.on{box-shadow:inset 0 0 0 1.5px var(--cleared);border-color:var(--cleared)}
  .qn{font-family:var(--mono);font-size:11px;color:var(--muted);background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:0 6px;margin-left:5px}
  .quadhint{font-size:12px;color:var(--soft);margin:12px 0 0}
  .quadactive{font-size:12px;color:var(--muted);display:inline-flex;align-items:center;gap:8px}
  .quadactive b{color:var(--ink)}
  .clearquad{background:none;border:1px solid var(--line);border-radius:6px;padding:2px 9px;font-size:11px;color:var(--muted);cursor:pointer;font-family:var(--sans)}
  .clearquad:hover{color:var(--signal);border-color:var(--signal)}
  /* clickable opportunity name */
  .opp-name{background:none;border:none;padding:0;text-align:left;cursor:pointer;font-family:var(--sans);display:flex;flex-direction:column;gap:1px}
  .opp-name b{font-size:13.5px;color:var(--ink);transition:color .12s}
  .opp-name .opp-caret{font-size:11px;color:var(--soft);transition:color .12s}
  .opp-name:hover b{color:var(--signal)}
  .opp-name:hover .opp-caret{color:var(--signal)}

  /* opportunity detail drawer */
  .drawer-wrap{position:fixed;inset:0;z-index:200}
  .drawer-backdrop{position:absolute;inset:0;background:rgba(42,24,48,.28);animation:fade .2s ease}
  .drawer{position:absolute;top:0;right:0;height:100%;width:min(480px,92vw);background:var(--surface);border-left:1px solid var(--line);box-shadow:-8px 0 44px rgba(42,24,48,.15);overflow-y:auto;animation:slidein .22s ease}
  @keyframes slidein{from{transform:translateX(34px);opacity:.4}to{transform:none;opacity:1}}
  .drawer-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:8px;border:1px solid var(--line);background:var(--surface);cursor:pointer;color:var(--muted);font-size:13px;z-index:2}

function facetKeys(d){return RUBRICS[d].map(f=>f.k);}
function facetDef(d,fk){return RUBRICS[d].find(f=>f.k===fk);}
function rubricFor(d,t){const keys=facetKeys(d);if(t<=0)return Object.fromEntries(keys.map(k=>[k,0]));const b=Math.min(5,t+1);const o=Object.fromEntries(keys.map(k=>[k,b]));o[keys[Math.min(2,keys.length-1)]]=t;return o;}
const CORE_IDX=[1,2];
function activeIdx(fac){const n=fac?fac.diag.length:4;return [0,1,2,3].filter(i=>i<n);}
function bandMax(s){return s===4?3:1;}
function qFrac(v,s){return (v==null)?null:(v/bandMax(s));}
function diagForLevel(L,sc){if(L<=0)return [null,null,null,null];let rem=L-1;const out=[0,0,0,0];for(let i=0;i<4;i++){const s=(sc&&sc[i])||2;const mx=bandMax(s);const step=1/mx;let b=Math.min(mx,Math.round(rem/step));if(b*step>rem+1e-9)b=Math.floor(rem/step+1e-9);out[i]=b;rem-=b*step;}return out;}
function abrForLevel(L){if(L<=0)return[null,null];let rem=(L-1)/2;const out=[0,0];for(let i=0;i<2;i++){const step=1/3;let b=Math.min(3,Math.round(rem/step));if(b*step>rem+1e-9)b=Math.floor(rem/step+1e-9);out[i]=b;rem-=b*step;}return out;}
function scaleLevelFor(dk,fk,idxs){const fac=facetDef(dk,fk);const arr=(state.diag&&state.diag[dk]&&state.diag[dk][fk])||[];const sc=fac.sc||[2,2,2,2];const fr=idxs.filter(i=>i<fac.diag.length).map(i=>qFrac(arr[i],sc[i]));if(!fr.length||fr.some(x=>x==null))return 0;const mean=fr.reduce((a,b)=>a+b,0)/fr.length;return Math.max(1,Math.min(5,Math.round(1+4*mean)));}
function diagLevel(dk,fk){const fac=facetDef(dk,fk);return scaleLevelFor(dk,fk,activeIdx(fac));}
function abrLevel(dk,fk){const arr=(state.abrDiag&&state.abrDiag[dk]&&state.abrDiag[dk][fk])||[];const fr=[0,1].map(i=>qFrac(arr[i],4));if(fr.some(x=>x==null))return 0;const mean=(fr[0]+fr[1])/2;return Math.max(1,Math.min(5,Math.round(1+4*mean)));}
function facetLevel(dk,fk){const fac=facetDef(dk,fk);
  if(state.mode==='abridged'&&fac.abr){return abrLevel(dk,fk);}
  if(fac.diag){return diagLevel(dk,fk);}
  return (state.rubric[dk]&&state.rubric[dk][fk])||0;}
function syncRubric(){
  if(!state.rubric)return;
  DIMS.forEach(d=>{
    const vals=facetKeys(d.k).map(k=>{const lv=facetLevel(d.k,k);if(state.rubric[d.k])state.rubric[d.k][k]=lv;return lv;});
    const done=vals.every(v=>v>0);
    state.readiness[d.k]=done?Math.min(...vals):0;
    if(state.evidence)state.evidence[d.k]=done?[true,true,true,true]:[false,false,false,false];
  });
}

function compute(){
  syncRubric();
  const r=state.readiness, isSet=k=>r[k]>0;
  const scored=DIMS.filter(d=>isSet(d.k)), sv=scored.map(d=>r[d.k]);
  const floor=sv.length?Math.min(...sv):null;
  const mean=sv.length?sv.reduce((a,b)=>a+b,0)/sv.length:null;
  const floorDims=floor==null?[]:scored.filter(d=>r[d.k]===floor).map(d=>d.k);
  const inScope=state.candidates.filter(c=>state.scope[c.dom]);
  const withStatus=inScope.map(c=>{const gs=isSet(c.gate);return {...c,gateScored:gs,cleared:gs&&r[c.gate]>=3,pending:!gs};});
  const survivors=withStatus.filter(c=>c.cleared), blocked=withStatus.filter(c=>c.gateScored&&!c.cleared), pending=withStatus.filter(c=>c.pending);
  const blockedHi=blocked.filter(c=>c.value>=4);
  const byGate={};blocked.forEach(c=>{(byGate[c.gate]=byGate[c.gate]||[]).push(c);});
  let bestFix=null;Object.entries(byGate).forEach(([g,list])=>{const val=list.reduce((a,c)=>a+c.value,0);if(!bestFix||val>bestFix.val)bestFix={gate:g,list,val,count:list.length};});
  const flags=[];const both=(a,b)=>isSet(a)&&isSet(b);
  if(both('data','governance')&&r.data>=4&&r.governance<=2)flags.push({h:'Strong data, weak governance',t:'you could build, but not deploy safely yet.'});
  if(both('tech','adoption')&&r.tech>=4&&r.adoption<=2)flags.push({h:'Good tools, low adoption',t:'tools get built, then go unused.'});
  if(both('strategy','delivery')&&r.strategy>=4&&r.delivery<=2)flags.push({h:'Clear plan, no route to production',t:'ambition that never reaches everyday use.'});
  if(both('talent','data')&&r.talent>=4&&r.data<=2)flags.push({h:'Capable team, poor data',t:'skilled people with nothing clean to work on.'});
  const evConf=DIMS.map(d=>{const set=isSet(d.k);const lvl=r[d.k];const checked=state.evidence[d.k].filter(Boolean).length;const needed=Math.max(0,lvl-1);return {k:d.k,name:d.name,set,lvl,checked,needed,total:4,verified:set&&checked>=needed};});
  return {r,floor,mean,floorDims,inScope,survivors,blocked,pending,blockedHi,bestFix,flags,evConf,scoredCount:scored.length,verifiedCount:evConf.filter(e=>e.verified).length};
}
function dimName(k){return DIMS.find(d=>d.k===k).name;}
function domName(k){const d=DOMAINS.find(x=>x.k===k);return d?d.name:k;}
function quadOf(o){return o.value>3?(o.effort<3?'quick':'bets'):(o.effort<3?'fill':'low');}
const QUADS={quick:'Quick wins',bets:'Strategic bets',fill:'Fill-ins',low:'Low priority'};
function oppStatus(o){const gs=state.readiness[o.gate]>0;if(!gs)return'pending';return state.readiness[o.gate]>=3?'ready':'blocked';}
function whenText(o){const s=oppStatus(o);if(s==='pending')return`Not yet clear. First assess ${dimName(o.gate)} in step 2.`;if(s==='ready')return`Ready to start now. The foundation it needs, ${dimName(o.gate)}, is in place.`;return`After you close the ${dimName(o.gate)} gap. Until then it stays blocked, however valuable.`;}

        ${state.mode==='abridged'?'<div class="cap-trim">Full mode also captures what was missing and the deployment approach.</div>':`
        <label class="cap-f"><span>What was missing, and why it fell short</span><textarea data-cx="priorGap" rows="2" placeholder="The binding reason, in your words">${esc((state.context||{}).priorGap)}</textarea></label>
        <label class="cap-f"><span>Deployment approach so far</span><select data-cx="deploy">${['','Internal centre of excellence','Use-case specific partners','SaaS or off-the-shelf','Mixed','None yet'].map(o=>`<option${((state.context||{}).deploy||'')===o?' selected':''}>${o||'Not set'}</option>`).join('')}</select></label>`}
      </div>
    </div>
    <div class="guide">
      <h4>What this assessment does</h4>
      <p>Five steps take you from a blank page to a sequenced plan. It separates two questions that are easy to confuse: <b>where</b> AI could help, and whether you are <b>ready</b> to capture it.</p>
      <ol class="steps-ov">
        <li><span><b>Where to focus.</b> The parts of your business in scope. You are here.</span></li>
        <li><span><b>Where you stand.</b> Your readiness, scored from evidence across seven organisation-wide foundations.</span></li>
        <li><span><b>Where AI can help.</b> The opportunities, mapped by impact and effort.</span></li>
        <li><span><b>What is in the way.</b> The single foundation blocking the most value.</span></li>
        <li><span><b>What to do first.</b> A sequenced plan: quick wins, the one key fix, then the bigger moves.</span></li>
      </ol>
      <p style="margin-top:16px">Tip: include the areas where you feel real pressure or already hold usable ${tip('data',T.data)}. You can change this at any time, and every later step updates.</p>
    </div>
  </div>`;
}

/* Step 2 */
function rungLadder(dk,fac){
  const sel=(state.rubric[dk]&&state.rubric[dk][fac.k])||0;
  const rows=[5,4,3,2,1].map(gl=>{
    const on=sel===gl, passed=sel>gl;
    const hm=(fac.marks&&fac.marks[gl-1])?` data-help="${fac.marks[gl-1].replace(/"/g,'&quot;')}"`:'';
    return `<button class="rung${on?' on':''}${passed?' passed':''}"${hm} data-rung="${dk}" data-rf="${fac.k}" data-rl="${gl}" aria-pressed="${on}"><span class="rung-dot"></span><span class="rung-txt">${fac.levels[gl-1]}</span><span class="rung-lv">L${gl}</span></button>`;
  }).join('');
  const ev=(state.artifact[dk]&&state.artifact[dk][fac.k])||'';
  return `<div class="rung-list">${rows}</div><input class="facet-note" type="text" data-notedim="${dk}" data-note="${fac.k}" placeholder="Evidence, optional: what shows you are at this level" value="${ev.replace(/"/g,'&quot;')}">`;
}
function diagBody(dk,fac){
  const abr = state.mode==='abridged' && fac.abr;
  const qs = abr ? fac.abr.map(a=>a.q) : fac.diag;
  const descs = abr ? fac.abr.map(a=>a.d) : (fac.desc||[]);
  const scales = abr ? qs.map(()=>4) : (fac.sc||[2,2,2,2]);
  const arr = abr ? ((state.abrDiag[dk]&&state.abrDiag[dk][fac.k])||[]) : ((state.diag[dk]&&state.diag[dk][fac.k])||[]);
  const notes = abr ? ((state.abrNote[dk]&&state.abrNote[dk][fac.k])||[]) : ((state.qnote[dk]&&state.qnote[dk][fac.k])||[]);
  const idxs = qs.map((_,i)=>i);
  const BANDS4=['None','Some','Most','All'], BANDS2=['No','Yes'];
  const answered=idxs.every(i=>arr[i]!=null);
  const lvl=answered?facetLevel(dk,fac.k):0;
  const topBackable=idxs.filter(i=>arr[i]===bandMax(scales[i])).length;
  const backed=idxs.filter(i=>arr[i]===bandMax(scales[i])&&notes[i]&&(''+notes[i]).trim()).length;
  const rows=idxs.map(i=>{const q=qs[i];const v=arr[i];const s=scales[i];const top=bandMax(s);
    const dsc=(descs[i])?` data-help="${(''+descs[i]).replace(/"/g,'&quot;')}"`:'';
    const labels=s===4?BANDS4:BANDS2;
    const btns=labels.map((lab,b)=>`<button class="diag-btn b${s}${v===b?' sel':''}${b===top&&v===b?' full':''}" data-diag="${dk}" data-df="${fac.k}" data-di="${i}" data-dv="${b}">${lab}</button>`).join('');
    const note=notes[i]||'';
    let flag='';
    if(!abr){const depI=(fac.dep&&fac.dep[i]!=null)?fac.dep[i]:null;const depActive=depI!=null&&idxs.indexOf(depI)>=0;const conflict=depActive&&v!=null&&v>=1&&arr[depI]===0;flag=conflict?`<div class="diag-flag">Unusual: this is marked present while the question it builds on is still answered No or None. Left as you set it, worth a recheck.</div>`:'';}
    else{const conflict=(i===1)&&arr[1]!=null&&arr[1]>=1&&arr[0]===0;flag=conflict?`<div class="diag-flag">Unusual: this is marked present while the first question above, which it builds on, is still answered None. Left as you set it, worth a recheck.</div>`:'';}
    const conflictCls=flag?' flagged':'';
    const isFull=v===top, isPartial=(v!=null&&v<top);
    const ph=isFull?'What shows this? A document, system, owner or metric (optional)':isPartial?'What is missing to reach full? (optional, becomes an action)':'';
    const noteField=(v!=null)?`<input class="qnote${note&&(''+note).trim()?' has':''}${isPartial?' gap':''}" type="text" data-qnote="${dk}" data-qf="${fac.k}" data-qi="${i}" placeholder="${ph}" value="${(''+note).replace(/"/g,'&quot;')}">`:'';
    const scaleTag=`<span class="diag-scale">${abr?'coverage':(s===4?'coverage':'yes / no')}</span>`;
    return `<div class="diag-item"><div class="diag-row${conflictCls}"><span class="diag-q"${dsc}>${q}${scaleTag}</span><span class="diag-yn s${s}">${btns}</span></div>${flag}${noteField}</div>`;}).join('');
  const nq=idxs.length;
  const modeTag=abr?` <span class="diag-abr">abridged: 2 graded questions</span>`:'';
  const readout=answered
    ? `<div class="diag-out">Computed: <b>Level ${lvl}</b> of 5, from your ${nq} answer${nq>1?'s':''} on this facet.${topBackable>0?` <b>${backed} of ${topBackable}</b> top answers backed by evidence.`:''}${modeTag}</div>`
    : `<div class="diag-out todo">Answer ${nq===1?'the question':(abr?'both questions':'all '+nq+' questions')} to compute this facet.${abr?' Each runs None, Some, Most, All; hover a question to see what each level means.':' Existence questions are Yes or No; coverage questions run None, Some, Most, All.'} The level is worked out from your answers, not chosen.${modeTag}</div>`;
  return `<div class="diag-list">${rows}</div>${readout}`;
}

function rubricBody(dk){
  const facetsDef=RUBRICS[dk], f=state.rubric[dk], keys=facetKeys(dk);
  const vals=keys.map(k=>f[k]||0);
  const complete=vals.every(v=>v>0);
  const derived=complete?Math.min(...vals):null;
  const fname=dimName(dk);
  const hasDiag=facetsDef.some(fac=>fac.diag);
  const minCount=complete?vals.filter(v=>v===derived).length:0;
  const facets=facetsDef.map(fac=>{
    const sel=f[fac.k]||0, bind=complete&&sel===derived&&minCount===1;
    const header=`<div class="facet-h"><span class="facet-name">${fac.name}</span>${sel?`<span class="facet-lvl${bind?' bind':''}">Level ${sel}${bind?' &middot; holds '+fname:''}</span>`:'<span class="facet-todo">not assessed</span>'}</div>`;
    return `<div class="facet">${header}${fac.diag?diagBody(dk,fac):rungLadder(dk,fac)}</div>`;
  }).join('');
  const binderFacets=complete?facetsDef.filter(fac=>f[fac.k]===derived):[];
  const binderTxt = binderFacets.length===facetsDef.length ? `with all ${facetsDef.length} facets sitting at Level ${derived}`
    : binderFacets.length===1 ? `held there by <b>${binderFacets[0].name}</b>`
    : `held there by <b>${binderFacets.map(x=>x.name).join(', ')}</b>, which are tied at this level`;
  const out=complete
    ? `<div class="rubric-out done">${fname} comes out at <b>${derived} of 5</b>, ${binderTxt}. The weakest facet caps the foundation, exactly as the weakest foundation caps your overall readiness.</div>`
    : `<div class="rubric-out">Work through all ${facetsDef.length} facets and the ${fname} level is derived automatically. <b>${vals.filter(v=>v>0).length} of ${facetsDef.length}</b> done.</div>`;
  const intro=hasDiag
    ? `For each facet, answer its questions. Existence questions are Yes or No; coverage questions run None, Some, Most, All. The facet level is <b>computed</b> from your answers, not chosen, and ${fname} is only as strong as its weakest facet.${state.mode==='abridged'?' Abridged mode asks two graded questions per facet, each carrying two of the four full checks.':''} <span class="rubric-hovercue">Hover any question to see what it means.</span>`
    : `For each facet, select the highest milestone that is genuinely true. Everything below it is taken as already met, so you record one level, not several. The ${fname} level is that milestone, and ${fname} is only as strong as its weakest facet.`;
  return `<div class="rubric"><div class="rubric-intro">${intro} Nothing is self-rated.</div>${facets}${out}</div>`;
}
function stageReadiness(c){
  const evByK=Object.fromEntries(c.evConf.map(e=>[e.k,e]));
  const items=DIMS.map((d,idx)=>{
    const ev=evByK[d.k], open=state.openDim===d.k;
    const badge=!ev.set?'<span class="badge notset">Not assessed</span>':'<span class="badge ok">Derived from rubric</span>';
    const body=open?`<div class="fnd-body-full">${rubricBody(d.k)}</div>`:'';
    return `<div class="fnd${open?' open':''}">
      <button class="fnd-head" data-open="${d.k}" aria-expanded="${open}">
        <span class="fnd-idx">${idx+1}</span>
        <span class="fnd-main"><span class="fnd-name">${d.name}</span><span class="fnd-role">${d.role}</span></span>
        <span class="fnd-state">${badge}<span class="fnd-lvl${ev.set?'':' empty'}">${ev.set?ev.lvl:'&ndash;'}</span><span class="chev">&#9656;</span></span>
      </button>${body}</div>`;
  }).join('');
  const flags=c.flags.length?c.flags.map(f=>`<div class="flag"><span class="fi">!</span><span><b>${f.h}:</b> ${f.t}</span></div>`).join(''):`<div class="flags-empty">No conflicting signals at these scores.</div>`;
  return `<div class="stage">
    <div class="lede"><div class="eyebrow">Step 2 of 5</div><h1>Where you stand</h1>
    <p>Step 1 mapped <b>where</b> AI could help. This step is different: these seven foundations are organisation-wide capabilities that apply across every area you selected, and they decide what any of them can actually reach ${tip('production',T.production)}. We assess each from ${tip('evidence',T.evidence)}, and your true readiness is the weakest of them, because your ${tip('weakest foundation',T.weakest)} sets the ceiling for everything above.</p>
    <div class="who">Answered with leadership and the heads of each area, backed by evidence</div></div>
    <div class="section-label lbl-help" data-help="The organisation-wide capabilities any AI needs to work, such as data or governance. They cut across every business area, so there are only seven. This is the 'are we ready' axis, separate from the business areas in scope. Readiness is set by the weakest of the seven.">The seven foundations<svg class="lbl-i" viewBox="0 0 20 20" aria-hidden="true" fill="currentColor"><path d="M10 2a8 8 0 100 16 8 8 0 000-16zm0 14.4A6.4 6.4 0 1110 3.6a6.4 6.4 0 010 12.8z"/><circle cx="10" cy="6.4" r="1.2"/><rect x="9" y="8.7" width="2" height="5.6" rx="1"/></svg></div>
    <div class="foundations">${items}</div>
    <div class="guide">
      <h4>How to complete this step</h4>
      <ul class="guide-list">
        <li><span class="gi">1</span><span>Open a foundation and answer each of its facets by picking the descriptor that matches reality.</span></li>
        <li><span class="gi">2</span><span>The foundation's level is <b>derived</b> automatically as its weakest facet. The descriptors you pick <b>are</b> the evidence; optionally note the document or system behind each.</span></li>
        <li><span class="gi">3</span><span>Nothing is self-rated, so nothing can be inflated. The score is whatever your own answers imply.</span></li>
      </ul>
      <p style="margin-top:16px">Why the weakest, not the average, at both levels: a single weak facet caps a foundation, and a single weak foundation caps your readiness. A route to ${tip('production',T.production)} that does not exist stops otherwise strong ideas from ever going live. Averaging hides that; the weakest link does not.</p>
    </div>
    <div class="notes"><div class="section-label">Worth a closer look</div>${flags}</div>
  </div>`;
}

/* Step 3 */
function stageOpportunity(c){
  const withStatus=c.inScope.map(x=>{const gs=state.readiness[x.gate]>0;return {...x,gateScored:gs,cleared:gs&&state.readiness[x.gate]>=3,pending:!gs};});
  const qcount={quick:0,bets:0,fill:0,low:0};c.inScope.forEach(o=>qcount[quadOf(o)]++);
  const qf=state.quadFilter;
  let ordered=state.hardFilter?[...c.survivors,...c.blocked,...c.pending]:withStatus;
  if(qf) ordered=ordered.filter(o=>quadOf(o)===qf);
  const rows=ordered.map(o=>{
    const cls=o.pending?' class="dim"':(state.hardFilter&&!o.cleared?' class="dim"':'');
    const status=o.pending?`<span class="status pend">&#9679; not assessed</span>`:o.cleared?`<span class="status ok">&#9679; ready</span>`:`<span class="status no">&#9679; blocked</span>`;
    const fitTxt=o.amen==='H'?'High':o.amen==='M'?'Medium':'Low';
    return `<tr${cls}>
      <td><button class="opp-name" data-opp="${o.name}"><b>${o.name}</b><span class="opp-caret">View brief &#8250;</span></button></td>
      <td><span class="arch">${ARCH[o.arch]||o.arch}</span></td>
      <td>${dimName(o.gate)}</td>
      <td><span class="fit ${o.amen}">${fitTxt}</span></td>
      <td class="ve"><span class="adjust"><button data-cal="${o.name}" data-f="value" data-d="-1" aria-label="less impact">&minus;</button><span class="sv">${o.value}</span><button data-cal="${o.name}" data-f="value" data-d="1" aria-label="more impact">+</button></span> &nbsp; <span class="adjust"><button data-cal="${o.name}" data-f="effort" data-d="-1" aria-label="less effort">&minus;</button><span class="sv">${o.effort}</span><button data-cal="${o.name}" data-f="effort" data-d="1" aria-label="more effort">+</button></span></td>
      <td>${status}</td></tr>`;}).join('');
  const qbox=(k,t,d)=>`<button class="qg ${k==='quick'?'sweet ':''}${qf===k?'on':''}" data-quad="${k}"><div class="qt">${t} <span class="qn">${qcount[k]}</span></div><div class="qd">${d}</div></button>`;
  return `<div class="stage">
    <div class="lede"><div class="eyebrow">Step 3 of 5</div><h1>Where AI can help</h1>
    <p>These are the opportunities available in the areas you selected in step 1. They are the menu of what AI could do for you. Each one depends on a single foundation, so whether it is ready to start is decided by your readiness in step 2. The matrix on the right places every opportunity by impact and effort; click any one for the full brief.</p></div>
    ${c.scoredCount<7?`<div class="prompt"><b>Readiness not scored yet (${c.scoredCount} of 7).</b> The opportunities below come from your selected areas, so they appear before scoring. Which are ready or blocked is decided in step 2, so those stay pending until you finish it.</div>`:''}
    <div class="section-label">Every opportunity in detail</div>
    <div class="filterbar">
      <div class="toggle${state.hardFilter?' on':''}" id="hf" tabindex="0" role="switch" aria-checked="${state.hardFilter}" data-help="Sorts the list so opportunities you can start now sit on top, with blocked and not-yet-assessed ones below and dimmed. It re-orders and emphasises, it does not filter, so the total stays the same."><div class="switch"></div>Ready ideas first</div>
      ${qf?`<span class="quadactive">Showing <b>${QUADS[qf]}</b> only<button class="clearquad" data-quad="clear">Show all</button></span>`:''}
      <span class="count-note"><b>${c.survivors.length}</b> ready &middot; <b>${c.blocked.length}</b> blocked &middot; <b>${c.pending.length}</b> not assessed &middot; of <b>${c.inScope.length}</b></span>
    </div>
    <table class="opps">
      <thead><tr><th>Opportunity</th><th>Type</th><th>Depends on</th><th>${tip('AI fit',T.fit)}</th><th>Impact / Effort</th><th>Status</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <p class="hint">Click an opportunity to open its brief. Impact is how much it helps (1 to 5); effort is how hard it is (1 to 5). Adjust either to fit your business.</p>
    <div class="guide">
      <h4>How to read this step</h4>
      <ul class="guide-list">
        <li><span class="gi">&#9679;</span><span><b>The matrix on the right</b> sorts every opportunity by impact and effort into four groups: quick wins (high impact, low effort), strategic bets, fill-ins and low priority. Start where the return is high and the effort is low.</span></li>
        <li><span class="gi">&#9679;</span><span><b>Colour shows readiness.</b> Green is ready to start now. Amber is blocked, because the one foundation it depends on is not yet in place. Grey is not yet assessed.</span></li>
        <li><span class="gi">&#9679;</span><span><b>Blocked is not lost.</b> A blocked, high-value opportunity is the reason to fix the foundation it waits on, which is what the next two steps work out.</span></li>
      </ul>
      <p style="margin-top:16px">The practical read: act on the ready quick wins now, and treat the blocked high-value ones as the case for fixing your weakest foundation.</p>
    </div>
  </div>`;
}
function matrixSVG(c){
  const W=430,H=360,pad=52;
  const px=v=>pad+((v-0.5)/5)*(W-pad*2), py=v=>H-pad-((v-0.5)/5)*(H-pad*2);
  const mx=px(3), my=py(3);
  const pts=c.inScope.map(o=>({...o,gs:state.readiness[o.gate]>0,cleared:state.readiness[o.gate]>=3})).map(o=>{
    const x=px(o.effort),y=py(o.value);const cur=' style="cursor:pointer" data-opp="'+o.name+'"';
    if(!o.gs)return `<circle cx="${x}" cy="${y}" r="6" fill="var(--line)" opacity="0.8"${cur}><title>${o.name}: not assessed</title></circle>`;
    if(o.cleared)return `<circle cx="${x}" cy="${y}" r="8" fill="var(--ink)"${cur}><title>${o.name}: ready</title></circle>`;
    return `<circle cx="${x}" cy="${y}" r="7.5" fill="#fff" stroke="var(--blocked)" stroke-width="1.8" stroke-dasharray="2.4 2.2"${cur}><title>${o.name}: blocked by ${dimName(o.gate)}</title></circle>`;}).join('');
  return `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Impact versus effort map">
    <rect x="${pad}" y="${pad}" width="${mx-pad}" height="${my-pad}" fill="rgba(31,122,92,.07)"/>
    <text x="${pad+8}" y="${pad+16}" font-size="9.5" fill="var(--cleared)" font-weight="700" letter-spacing=".08em">SWEET SPOT</text>
    <line x1="${mx}" y1="${pad-8}" x2="${mx}" y2="${H-pad+8}" stroke="var(--hair)"/>
    <line x1="${pad-8}" y1="${my}" x2="${W-pad+8}" y2="${my}" stroke="var(--hair)"/>
    <text x="${pad-10}" y="${pad-18}" font-size="10" fill="var(--soft)" letter-spacing=".1em">HIGH IMPACT</text>
    <text x="${pad-10}" y="${H-pad+26}" font-size="10" fill="var(--soft)" letter-spacing=".1em">LOW IMPACT</text>
    <text x="${pad-8}" y="${H-12}" font-size="10" fill="var(--soft)" letter-spacing=".1em">LOW EFFORT</text>
    <text x="${W-pad-8}" y="${H-12}" font-size="10" fill="var(--soft)" letter-spacing=".1em" text-anchor="end">HIGH EFFORT</text>
    ${pts}</svg>`;
}

/* Step 4 */

      <div class="gi-why">Held back only by <b>${dimName(o.gate)}</b>. The opportunity is sound; that one foundation is missing.</div></div>`).join(''):`<div class="flags-empty">No high-value opportunities are currently blocked.</div>`;
  let verdict;

      <p>The strongest blocked opportunities all depend on the same foundation: <span class="hl">${dimName(c.bestFix.gate)}</span>. So the highest-leverage first move is not a new use case. It is closing that one gap, which unlocks <b>${c.bestFix.count}</b> ${c.bestFix.count>1?'opportunities':'opportunity'} at once${names.length?`, including ${names.slice(0,2).join(' and ')}`:''}.</p></div>`;
  } else {
    verdict=`<div class="verdict"><div class="eyebrow">The one thing to fix</div><p>Nothing significant is blocked. You can move straight to sequencing the ready opportunities.</p></div>`;
  }

    <div class="lede"><div class="eyebrow">Step 4 of 5</div><h1>What is in the way</h1>
    <p>The best opportunities are often held back by the same missing foundation. That is the useful part: one focused fix can unlock several at once. The chart on the right shows the value waiting behind each gap.</p></div>
    <div class="guide">
      <h4>How to read this step</h4>
      <p>Each bar totals the value of the opportunities waiting on one foundation. The longest bar, in red, is where a single fix frees the most value at once. That is your highest-leverage first move, and it is usually not a new use case but closing that one gap.</p>
      <p>This is the difference between a wish list and a plan. A list ranks ideas; this ranks the <b>constraints</b> that decide which ideas you can actually reach.</p>
    </div>
    ${verdict}
    <div class="section-label" style="margin-top:30px">The high-value opportunities held back</div>
    <div class="gap-list">${items}</div></div>`;
}

/* Step 5 */
function stageRoadmap(c){
  if(c.scoredCount<7){
    return `<div class="stage"><div class="lede"><div class="eyebrow">Step 5 of 5</div><h1>What to do first</h1>
      <p>The final step turns everything above into a sequenced plan: what to start now, the one thing to fix next, and the bigger moves to reach later. It is generated once your readiness is complete.</p></div>

    let c=`<text x="10" y="${y+16}" font-size="10.5" fill="var(--muted)">${label}</text>`;
    for(let i=0;i<count;i++){const x=x0+i*30,weak=i===weakIdx;
      c+=`<rect x="${x}" y="${y}" width="24" height="24" rx="6" fill="${weak?'var(--signal)':'var(--surface)'}" stroke="${weak?'none':'var(--line)'}" stroke-width="1.4"/>`;}
    const ex=x0+count*30-6;
    c+=`<path d="M${ex} ${y+12} L${ex+16} ${y+12}" stroke="var(--soft)" stroke-width="1.4"/><path d="M${ex+11} ${y+8} L${ex+17} ${y+12} L${ex+11} ${y+16}" fill="none" stroke="var(--soft)" stroke-width="1.4"/>`;
    c+=`<text x="${ex+24}" y="${y+16}" font-size="12" fill="var(--muted)">${result} = <tspan font-size="14" fill="var(--signal)" font-weight="700" font-family="var(--mono)">${val}</tspan></text>`;
    return c;
  };
  return `<svg viewBox="0 0 640 168" role="img" aria-label="The weakest link at two levels">
    ${row(28,5,2,214,'A foundation, from its facets','Data','2')}
    ${row(94,7,4,214,'Readiness, from its seven foundations','Readiness','2')}
    <text x="10" y="150" font-size="10.5" fill="var(--soft)">The same rule at both levels: the weakest link sets the ceiling, and it is what you fix.</text>
  </svg>`;
}

function howItWorks(){
  return `
    <div class="hw-head"><div class="hw-head-row"><div><div class="eyebrow">How it works</div><h1>What this tool does, in plain terms</h1></div>
      <div class="mode-toggle" role="group" aria-label="Assessment length"><span class="mode-lbl">Length</span><button class="mode-btn${state.mode==='abridged'?' on':''}" data-mode="abridged">Abridged &middot; 74</button><button class="mode-btn${state.mode==='full'?' on':''}" data-mode="full">Full &middot; 148</button></div></div>
      <p>Read top to bottom, this is the whole assessment: why it exists, what you get, how the number is worked out, how it runs, and who it is for. The length toggle, top right, switches between the abridged run of 74 questions and the full 148; it opens on abridged and keeps every answer when you switch.</p></div>
    <div class="hw-narrative">

      <section class="hw-beat"><div class="hw-beat-n">1</div><div class="hw-beat-b">
        <h3>Why it exists</h3>
        <p>Most AI programmes stall on missing groundwork, not on bad ideas. A promising use case fails because the data is not ready, or no one owns the risk, or nothing ever reaches production. This tool finds those gaps before money is spent, so you build on what is actually there rather than what you hoped was.</p>
      </div></section>

      <section class="hw-beat"><div class="hw-beat-n">2</div><div class="hw-beat-b">
        <h3>What you get</h3>
        <p>Three things: a readiness score out of five, your weakest foundation (the capability that most limits what you can do with AI), and a plan of what to do now, next and later. It is a diagnosis and an ordered set of moves, not a pitch for AI.</p>
      </div></section>

      <section class="hw-beat"><div class="hw-beat-n">3</div><div class="hw-beat-b">
        <h3>The one rule: your weakest link</h3>
        <p>Your readiness is set by your weakest foundation, not the average of the seven. If six are strong and one is weak, the weak one decides what you can actually do, the way a chain breaks at its weakest link. Strong data cannot rescue weak governance if governance is what blocks the work. So the tool reports the lowest of the seven, because that is the one to fix.</p>
      </div></section>

      <section class="hw-beat"><div class="hw-beat-n">4</div><div class="hw-beat-b">
        <h3>How the score is worked out</h3>
        <p>Your score is built from facts, not opinions. Each foundation breaks into parts, and each part into concrete questions. Existence questions are answered Yes or No; coverage questions run None, Some, Most, All, so being most of the way counts instead of being lost as a No. Higher answers lift the part, a part scores as low as its weakest signal, and your readiness scores as low as your weakest foundation. The picture below shows it, from parts to foundation to readiness.</p>
        <div class="hw-vcard hw-inline">${hwScoringChain()}</div>
      </div></section>

      <section class="hw-beat"><div class="hw-beat-n">5</div><div class="hw-beat-b">
        <h3>The five steps, and who does what</h3>
        <p>The assessment runs as five steps. The tool structures the questions and does the scoring; you and your team supply the evidence and make every decision. It makes the reasoning visible so the room can agree on it. It does not decide for you.</p>
        <div class="hw-vcard hw-inline">${hwPipeline()}</div>
      </div></section>

      <section class="hw-beat"><div class="hw-beat-n">6</div><div class="hw-beat-b">
        <h3>How a gap becomes a plan: ready or blocked</h3>
        <p>Every opportunity needs one foundation to reach level 3 of 5 or above. At or above that bar, the opportunity is <b>ready</b> to start. Below it, the opportunity is <b>blocked</b> for now, which makes it the reason to strengthen that foundation. In the picture, Document search needs Governance, which is at 2 and below the bar, so it is blocked; Competitor scan needs Adoption, at 3, so it is ready.</p>
        <div class="hw-vcard hw-inline">${hwGate()}</div>
      </div></section>

      <section class="hw-beat"><div class="hw-beat-n">7</div><div class="hw-beat-b">
        <h3>Who runs it, where and when</h3>
        <p>It is run by a facilitator with your leadership and the heads of each area, not filled in alone, because the answers need people who know the ground truth. It is sector-agnostic: the seven foundations are universal, and the business areas span the whole organisation, from operations to finance, so nothing is left out. Use it at the start to set a baseline, and again later to measure how far you have moved.</p>
      </div></section>

    </div>`;
}

function crc32(buf){let c,t=crc32.t;if(!t){t=crc32.t=[];for(let n=0;n<256;n++){c=n;for(let k=0;k<8;k++)c=c&1?0xEDB88320^(c>>>1):c>>>1;t[n]=c>>>0;}}c=0xFFFFFFFF;for(let i=0;i<buf.length;i++)c=t[(c^buf[i])&0xFF]^(c>>>8);return(c^0xFFFFFFFF)>>>0;}
function strBytes(s){return new TextEncoder().encode(s);}
function esc(s){return (s==null?'':(''+s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function xesc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function colName(n){let s='';n++;while(n>0){let m=(n-1)%26;s=String.fromCharCode(65+m)+s;n=(n-m-1)/26;}return s;}
function sheetXml(rows){

  rows.forEach((row,ri)=>{x+=`<row r="${ri+1}">`;row.forEach((cell,ci)=>{const ref=colName(ci)+(ri+1);if(cell===null||cell===undefined||cell==='')return;if(typeof cell==='number'&&isFinite(cell))x+=`<c r="${ref}"><v>${cell}</v></c>`;else x+=`<c r="${ref}" t="inlineStr"><is><t xml:space="preserve">${xesc(cell)}</t></is></c>`;});x+='</row>';});
  return x+'</sheetData></worksheet>';
}
function buildXlsx(sheets){
  const files=[];
  files.push({name:'[Content_Types].xml',data:strBytes('<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>'+sheets.map((s,i)=>`<Override PartName="/xl/worksheets/sheet${i+1}.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>`).join('')+'</Types>')});
  files.push({name:'_rels/.rels',data:strBytes('<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>')});
  files.push({name:'xl/workbook.xml',data:strBytes('<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets>'+sheets.map((s,i)=>`<sheet name="${xesc(s.name)}" sheetId="${i+1}" r:id="rId${i+1}"/>`).join('')+'</sheets></workbook>')});
  files.push({name:'xl/_rels/workbook.xml.rels',data:strBytes('<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">'+sheets.map((s,i)=>`<Relationship Id="rId${i+1}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet${i+1}.xml"/>`).join('')+'</Relationships>')});
  sheets.forEach((s,i)=>files.push({name:`xl/worksheets/sheet${i+1}.xml`,data:strBytes(sheetXml(s.rows))}));
  const chunks=[],central=[];let offset=0;const u16=n=>[n&255,(n>>8)&255],u32=n=>[n&255,(n>>8)&255,(n>>16)&255,(n>>24)&255];
  files.forEach(f=>{const nameB=strBytes(f.name),crc=crc32(f.data),sz=f.data.length;
    const lh=[].concat([0x50,0x4b,0x03,0x04],u16(20),u16(0),u16(0),u16(0),u16(0),u32(crc),u32(sz),u32(sz),u16(nameB.length),u16(0));
    chunks.push(new Uint8Array(lh),nameB,f.data);
    const cd=[].concat([0x50,0x4b,0x01,0x02],u16(20),u16(20),u16(0),u16(0),u16(0),u16(0),u32(crc),u32(sz),u32(sz),u16(nameB.length),u16(0),u16(0),u16(0),u16(0),u32(0),u32(offset));
    central.push(new Uint8Array(cd),nameB);offset+=lh.length+nameB.length+sz;});
  let cdSize=0;central.forEach(c=>cdSize+=c.length);const cdOffset=offset;
  const eocd=[].concat([0x50,0x4b,0x05,0x06],u16(0),u16(0),u16(files.length),u16(files.length),u32(cdSize),u32(cdOffset),u16(0));
  const all=[...chunks,...central,new Uint8Array(eocd)];let total=0;all.forEach(a=>total+=a.length);
  const out=new Uint8Array(total);let p=0;all.forEach(a=>{out.set(a,p);p+=a.length;});return out;
}
function fileStem(){return (state.clientName||'assessment').replace(/[^a-z0-9]+/gi,'_').replace(/^_|_$/g,'')+'_AI_readiness';}
function downloadBytes(bytes,name,mime){const blob=new Blob([bytes],{type:mime});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=name;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},400);}
function buildAssessmentXlsx(c){
  const dateStr=new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
  const fix=(c.bestFix&&c.blockedHi.length)?c.bestFix:null;
  const inScopeAreas=DOMAINS.filter(d=>state.scope[d.k]).map(d=>d.name).join(', ');
  const summary=[['AI Readiness Assessment'],['Client',state.clientName||'-'],['Date',dateStr],[],
    ['Readiness (weakest foundation)',c.floor==null?'-':c.floor+' / 5'],
    ['Set by',c.floorDims.map(dimName).join(', ')||'-'],
    ['Opportunities ready',c.survivors.length],['Opportunities blocked',c.blocked.length],
    ['The one thing to fix first',fix?dimName(fix.gate):'-'],['Unlocked by fixing it',fix?fix.count:0],[],
    ['Areas in scope',inScopeAreas],[],['Context (not scored)'],['What AI has been tried',(state.context&&state.context.priorWhat)||'-'],['Performance vs plan',(state.context&&state.context.priorResult)||'-'],['What was missing',(state.context&&state.context.priorGap)||'-'],['Deployment approach',(state.context&&state.context.deploy)||'-'],['Assessment length',state.mode==='abridged'?'Abridged (74)':'Full (148)']];
  const readiness=[['Foundation','Derived level','Facet','Facet level','Descriptor','Evidence note']];
  DIMS.forEach(d=>{const facs=RUBRICS[d.k];const derived=state.readiness[d.k]||0;
    facs.forEach(fac=>{const lvl=state.rubric[d.k][fac.k]||0;const desc=lvl?fac.levels[lvl-1]:'';
      readiness.push([d.name,derived||'-',fac.name,lvl||'-',desc,state.artifact[d.k][fac.k]||'']);});});
  const opps=[['Opportunity','Area','Type','Depends on','Impact','Effort','Status','Priority']];
  c.inScope.forEach(o=>opps.push([o.name,domName(o.dom),ARCH[o.arch]||o.arch,dimName(o.gate),o.value,o.effort,oppStatus(o),QUADS[quadOf(o)]]));
  const now=[...c.survivors].sort((a,b)=>(b.value-b.effort)-(a.value-a.effort)).slice(0,6);
  const unlocks=fix?fix.list.filter(x=>x.value>=4):[];
  const later=[...c.survivors].filter(x=>x.effort>=4||(x.value>=4&&x.effort>=3));
  const short=o=>oppBrief(o).what;
  const plan=[['Horizon','Item','Detail']];
  now.forEach(o=>plan.push(['Start now',o.name,short(o)]));
  if(fix){plan.push(['Fix next','Close the '+dimName(fix.gate)+' gap','Unlocks '+fix.count]);unlocks.forEach(o=>plan.push(['Fix next','then '+o.name,short(o)]));}
  later.forEach(o=>plan.push(['Later',o.name,short(o)]));
  return buildXlsx([{name:'Summary',rows:summary},{name:'Readiness',rows:readiness},{name:'Opportunities',rows:opps},{name:'Plan',rows:plan}]);
}
