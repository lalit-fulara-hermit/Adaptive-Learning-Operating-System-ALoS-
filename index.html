function printReport(){const c=compute();if(!(state.clientName||'').trim()){alert('Enter a name for this assessment (top left) before exporting, so the report is not addressed to "Your organisation".');return;}if(c.scoredCount<7){alert('Complete all seven foundations in step 2 before exporting the report.');return;}renderReport(c);window.print();}
function interpretationText(c){
  const f=c.floor, name=state.clientName||'Your organisation';
  const bands={1:'Very early',2:'Early',3:'Developing',4:'Advanced',5:'Leading'};
  const band=bands[f]||'Early';
  const floorNames=c.floorDims.map(dimName).join(' and ');
  const fix=(c.bestFix&&c.blockedHi.length)?c.bestFix:null;
  const ready=c.survivors.length, blocked=c.blocked.length, scope=c.inScope.length;
  const lead = f<=2
    ? `${name} is at the ${band.toLowerCase()} stage of AI readiness, ${f} of 5. The number is set by ${floorNames}, the weakest of the seven foundations. Under the weakest-link rule that single foundation caps what AI can deliver today, however capable the others are, so effort spent elsewhere returns little until it is raised. The right first move is therefore not another use case but removing the one constraint that holds the rest back, then banking the quick wins that are already unblocked.`
    : f===3
    ? `${name} sits at a developing stage, ${f} of 5, set by ${floorNames}. Targeted AI is viable now. The task is to standardise what already works and lift the weakest foundation, so that isolated wins become a repeatable capability rather than one-off successes that do not compound.`
    : `${name} is at an advanced stage, ${f} of 5, set by ${floorNames}. Most foundations are in place, so the agenda shifts from readiness to scale and control: extend the proven use cases and tighten governance so growth stays safe as volume rises.`;
  const context = fix
    ? `The highest-leverage first move is to close the ${dimName(fix.gate)} gap, which alone unblocks ${fix.count} ${fix.count>1?'opportunities':'opportunity'} that are otherwise stranded. This is leverage, not a new initiative: the value is already identified and waiting on one enabling foundation.`
    : `No high-value opportunity is currently blocked by a missing foundation, so value can be captured immediately through the ready moves rather than waiting on enabling work.`;
  const bullets=[
    `Readiness is ${f} of 5, the level of the weakest foundation, ${floorNames}. The average across the seven is deliberately not used, because the weakest link is what limits delivery.`,
    fix?`Closing the ${dimName(fix.gate)} gap is the single first move: it unlocks ${fix.count} blocked ${fix.count>1?'opportunities':'opportunity'} at once, more than any individual use case would return.`:`With nothing high-value blocked, sequencing is about impact and effort, not about clearing a constraint.`,
    `${ready} of ${scope} ${ready===1?'opportunity is':'opportunities are'} ready to start now; ${blocked} ${blocked===1?'is':'are'} blocked until the binding foundation is raised.`,
    `The plan sequences these into now, next and later, each carrying an owner, a first pilot and a measure, so it can be executed rather than admired.`
  ];
  const close=`Read this as a plan, not a scorecard. The sections that follow set out where you stand, where AI can help, the one constraint to remove first, and the ordered moves to make. Every figure is derived from the evidence gathered in the session, so nothing here is self-rated.`;
  return `<div class="rep-sec rep-exec"><div class="ps-lbl">Executive summary</div>`+
    `<p class="exec-lead"><b>${band}.</b> ${lead}</p>`+
    `<p class="exec-mid">${context}</p>`+
    `<ul class="exec-bul">${bullets.map(b=>`<li>${b}</li>`).join('')}</ul>`+
    `<p class="exec-close">${close}</p></div>`;
}

function fiveWCard(o){
  const b=oppBrief(o), st=oppStatus(o);

  const cells=[['What',b.what],['Why',b.why],['How',b.how],['Where',domName(o.dom)+'. It draws on that function\u2019s data and processes.'],['When',when],['Who',b.who]];

    `<div class="w5h-sup"><div><span>Measure</span>${b.metric}</div>`+

function fixCard(c,fix){
  const gate=fix.gate, lvl=state.readiness[gate];
  const facs=RUBRICS[gate];
  const weak=facs.filter(f=>state.rubric[gate][f.k]===lvl);
  const cells=[
    ['What',`Raise ${dimName(gate)} from level ${lvl} to a workable level 3, the point at which the opportunities it gates can proceed.`],
    ['Why',`${dimName(gate)} is the weakest foundation, so it caps readiness and blocks ${fix.count} otherwise-ready ${fix.count>1?'opportunities':'opportunity'}. It is the highest-leverage single move.`],
    ['How',`Turn the specific answers still short of full, listed in the diagnostic, into owned actions with dates. Each is a concrete task, not a theme.`],
    ['Where',`${dimName(gate)}, most acutely in ${weak.map(f=>f.name).join(', ')||'its weakest facets'}.`],
    ['When',`Next. This runs in parallel with the quick wins and precedes the opportunities it unlocks.`],
    ['Who',`The ${dimName(gate).toLowerCase()} owner, accountable for closing the named gaps.`]
  ];
  const grid=cells.map(x=>`<div class="w-cell"><span class="w-k">${x[0]}</span><span class="w-v">${x[1]}</span></div>`).join('');
  return `<div class="w5h w5h-fix"><div class="w5h-grid">${grid}</div>`+
    `<div class="w5h-sup"><div><span>Measure</span>${dimName(gate)} reaches level 3 of 5 and the ${fix.count} blocked ${fix.count>1?'items':'item'} move to ready.</div>`+
    `<div><span>Unlocks</span>${fix.list.map(o=>o.name).join(', ')}</div></div></div>`;
}

function contextSection(){
  const cx=state.context||{};
  const has=(cx.priorWhat||cx.priorResult||cx.priorGap||cx.deploy);
  if(!has) return '';
  const trimmed = state.mode==='abridged';
  const rows=[];
  if(cx.priorWhat) rows.push(['What has been tried',cx.priorWhat]);
  if(cx.priorResult) rows.push(['How it performed against plan',cx.priorResult]);
  if(!trimmed && cx.priorGap) rows.push(['What was missing, and why',cx.priorGap]);
  if(!trimmed && cx.deploy) rows.push(['Deployment approach',cx.deploy]);
  if(!rows.length) return '';
  const body=rows.map(r=>`<div class="cx-row"><span>${r[0]}</span><p>${(''+r[1]).replace(/</g,'&lt;')}</p></div>`).join('');
  return `<div class="rep-sec rep-break"><div class="ps-lbl">What prior AI attempts reveal</div>`+
    `<p class="rep-note">Read as the truest signal of real, as opposed to claimed, maturity. Past underdelivery shows where capability actually sits.</p>${body}</div>`;
}

  const name=state.clientName||'Your organisation';
  const modeBadge=`<span class="ps-mode">${state.mode==='abridged'?'Abridged assessment':'Full assessment'}</span>`;
  const head=`<div class="ps-head"><div><div class="ps-eyebrow">AI Readiness Assessment</div><h1>${name}</h1></div><div class="ps-headr"><div class="ps-date">${date}</div>${modeBadge}</div></div>`;
  if(c.scoredCount<7){
    ps.innerHTML=head+`<div class="ps-note">This assessment is incomplete: <b>${c.scoredCount} of 7</b> foundations scored. Complete step 2 before exporting a client report. This page exists so an accidental print never produces a misleading result.</div>`;
    return;
  }
  const floorNames=c.floorDims.map(dimName).join(' and ');
  const fix=(c.bestFix&&c.blockedHi.length)?c.bestFix:null;
  const now=[...c.survivors].sort((a,b)=>(b.value-b.effort)-(a.value-a.effort)).slice(0,6);
  const unlocks=fix?fix.list.filter(x=>x.value>=4):[];
  const later=[...c.survivors].filter(x=>x.effort>=4||(x.value>=4&&x.effort>=3));
  const seen={}; const recs=[]; [...now,...unlocks].forEach(o=>{if(!seen[o.name]){seen[o.name]=1;recs.push(o);}});
  const rdRows=DIMS.map(d=>{const lvl=state.readiness[d.k];const facs=RUBRICS[d.k];const bf=facs.filter(f=>state.rubric[d.k][f.k]===lvl);const binder=bf.length===facs.length?'all facets at this level':bf.length===1?bf[0].name:bf.map(f=>f.name).join(', ')+' (tied)';const isFloor=c.floorDims.indexOf(d.k)>=0;
    return `<tr class="${isFloor?'rd-floor':''}"><td>${d.name}${isFloor?' <span class="rd-cap">caps readiness</span>':''}</td><td class="rd-lvl">${lvl} / 5</td><td>${binder}</td></tr>`;}).join('');
  // diagnostic detail for the binding foundation(s): the specific shortfalls
  const gapDetail=c.floorDims.map(dk=>{const lvl=state.readiness[dk];const facs=RUBRICS[dk];const weak=facs.filter(f=>state.rubric[dk][f.k]===lvl);
    const abr=state.mode==='abridged';
    const items=weak.map(f=>{const arr=(abr?(state.abrDiag[dk]&&state.abrDiag[dk][f.k]):(state.diag[dk]&&state.diag[dk][f.k]))||[];const qn=(abr?(state.abrNote[dk]&&state.abrNote[dk][f.k]):(state.qnote[dk]&&state.qnote[dk][f.k]))||[];const qsrc=abr?(f.abr?f.abr.map(a=>a.q):[]):f.diag;const sc=abr?qsrc.map(()=>4):(f.sc||[2,2,2,2]);
      const short=qsrc.map((q,i)=>({q,i})).filter(x=>arr[x.i]!=null&&arr[x.i]<bandMax(sc[x.i]));
      const list=short.length?short.map(x=>{const r=(qn[x.i]||'').trim();return `<li>${x.q}${r?` <span class="gd-why">${r.replace(/</g,'&lt;')}</span>`:''}</li>`;}).join(''):'<li class="gd-none">All answered questions are already at full.</li>';
      return `<div class="gd-facet"><div class="gd-h">${f.name} <span>level ${state.rubric[dk][f.k]}</span></div><ul>${list}</ul></div>`;}).join('');
    return `<div class="gd-dim"><h4>${dimName(dk)}, the binding constraint</h4>${items}</div>`;}).join('');
  const moveHtml=recs.map(o=>{const st=oppStatus(o);
    return `<div class="rep-move"><div class="rep-move-h"><h3>${o.name}</h3><span class="rep-tag ${st}">${st==='ready'?'Ready now':'Unblocked by the fix'}</span></div>`+
      `<div class="rep-meta">${domName(o.dom)} &middot; ${ARCH[o.arch]||o.arch} &middot; impact ${o.value}, effort ${o.effort}</div>${fiveWCard(o)}</div>`;}).join('');
  ps.innerHTML=head+interpretationText(c)+`
    <div class="rep-sec">
      <div class="ps-grid">
        <div class="ps-block ps-floor"><div class="ps-lbl">Readiness</div><div class="ps-big">${c.floor}<span> / 5</span></div>
          <p>Set by ${floorNames}, the weakest of the seven foundations. Readiness is read off the weakest foundation because it caps everything above it. ${c.survivors.length} of ${c.inScope.length} opportunities are ready; ${c.blocked.length} are blocked.</p></div>
        <div class="ps-block"><div class="ps-lbl">The one thing to fix first</div>
          ${fix?`<div class="ps-fix">${dimName(fix.gate)}</div><p>Closing this single gap unlocks ${fix.count} high-value ${fix.count>1?'opportunities':'opportunity'}. Highest-leverage first move: not a new use case, but removing the constraint that holds several back.</p>`:`<p>No high-value opportunity is currently blocked. Proceed straight to the ready moves.</p>`}</div>
      </div>
    </div>
    <div class="rep-sec">
      <div class="ps-lbl">The diagnostic picture</div>
      <table class="rep-table"><thead><tr><th>Foundation</th><th>Level</th><th>Held there by</th></tr></thead><tbody>${rdRows}</tbody></table>
      <p class="rep-note">Each foundation scores as low as its weakest facet; each facet is computed from concrete questions, not chosen. The rows marked cap your readiness.</p>
      ${gapDetail}
    </div>
    <div class="rep-sec rep-break">
      <div class="ps-lbl">Where AI can help</div>
      <p class="rep-note">The moves to act on now and those the fix unlocks. Each carries a full What, Why, How, Where, When and Who, with its measure and prerequisite.</p>
      ${moveHtml||'<p class="rep-note">No recommended moves are ready yet.</p>'}
    </div>
    ${fix?`<div class="rep-sec rep-break"><div class="ps-lbl">The critical path</div><p class="rep-note">The single constraint to remove first, and what it frees.</p>${fixCard(c,fix)}</div>`:''}
    <div class="rep-sec rep-break">
      <div class="ps-lbl">The sequenced plan</div>
      <div class="ps-lanes">
        <div><h4>Start now</h4><ul>${now.map(o=>`<li>${o.name}<span>${domName(o.dom)}</span></li>`).join('')||'<li class="none">None yet</li>'}</ul></div>
        <div><h4>Fix next</h4><ul>${fix?`<li>Close the ${dimName(fix.gate)} gap <span>unlocks ${fix.count}</span></li>`+unlocks.map(o=>`<li>&#8627; ${o.name}</li>`).join(''):'<li class="none">Nothing to unblock</li>'}</ul></div>
        <div><h4>Later</h4><ul>${later.map(o=>`<li>${o.name}<span>impact ${o.value} / effort ${o.effort}</span></li>`).join('')||'<li class="none">None yet</li>'}</ul></div>
      </div>
    </div>
    ${contextSection()}
    <div class="rep-sec rep-method">
      <div class="ps-lbl">Method and basis</div>
      <p class="rep-note">Readiness is the level of the weakest of seven foundations; each foundation is the level of its weakest facet; each facet is computed from your answers, existence questions as yes or no and coverage questions as none, some, most or all. Opportunities are ready only when the one foundation they depend on reaches level 3. Impact and effort are calibrated against your own numbers. This was ${state.mode==='abridged'?'an abridged run of 74 questions, the two most telling per facet':'a full run of 148 questions'}; nothing is self-rated.</p>
    </div>
    <div class="ps-foot">Every figure is derived from the evidence gathered in your session.</div>`;
}
function renderPrintSheet(c){return renderReport(c);}
function fixBrief(c){
  const gate=state.openFix, lvl=state.readiness[gate];
  const facs=RUBRICS[gate];
  const weak=facs.filter(f=>state.rubric[gate][f.k]===lvl);
  const sec=(q,body)=>`<div class="dw-sec"><div class="dw-q">${q}</div>${body}</div>`;
  const gapItems=weak.map(f=>{
    const ans=(state.diag[gate]&&state.diag[gate][f.k])||[];
    const qn=(state.qnote[gate]&&state.qnote[gate][f.k])||[];
    const nos=f.diag.map((q,i)=>({q,i})).filter(x=>ans[x.i]===false);
    const list=nos.length?`<ul class="fx-gaps">${nos.map(x=>{const r=(qn[x.i]||'').trim();return `<li>${x.q}${r?`<span class="fx-why">Why: ${r.replace(/</g,'&lt;')}</span>`:''}</li>`;}).join('')}</ul>`:`<p class="fx-none">All four questions here are already Yes.</p>`;
    return `<div class="fx-facet"><div class="fx-facet-h"><span>${f.name}</span><span class="fx-lvl">Level ${state.rubric[gate][f.k]}</span></div>${list}</div>`;
  }).join('');
  const unlocks=(c.bestFix&&c.bestFix.gate===gate)?c.bestFix.list:c.blocked.filter(o=>o.gate===gate);
  const unlockList=unlocks.length?`<ul class="fx-unlocks">${unlocks.map(o=>`<li class="li-click" data-opp="${o.name.replace(/"/g,'&quot;')}"><span>${o.name}</span><span class="li-v">${o.value}/${o.effort}</span></li>`).join('')}</ul>`:'<p>Nothing in scope is blocked by this foundation right now.</p>';
  const afterFix={...state.readiness};afterFix[gate]=Math.max(3,afterFix[gate]||0);
  const nf=Math.min(...DIMS.map(d=>afterFix[d.k]||0));
  const nfDims=DIMS.filter(d=>(afterFix[d.k]||0)===nf).map(d=>dimName(d.k));
  const nextCap=nf>=5
    ? `Once ${dimName(gate)} clears, every remaining foundation is already strong, so your readiness is no longer capped.`
    : `Closing this frees value immediately. But note: your readiness number stays capped at <b>${nf} of 5</b> by <b>${nfDims.join(', ')}</b> until ${nfDims.length>1?'those are':'that is'} raised too. So the value starts flowing after this fix, while the headline number only moves once ${nfDims.length>1?'they are':'it is'} lifted as well. ${nfDims.join(', ')} ${nfDims.length>1?'are':'is'} your next fix.`;
  return `<div class="drawer-wrap"><div class="drawer-backdrop" data-close></div>
    <aside class="drawer" role="dialog" aria-label="How to close the gap">
      <button class="drawer-close" data-close aria-label="Close">&#10005;</button>
      <div class="dw-head">
        <div class="dw-where">The fix that frees the most value</div>
        <h2>Raise ${dimName(gate)} from level ${lvl}</h2>
        <div class="dw-pills"><span class="dw-pill no">Now ${lvl} of 5</span><span class="dw-pill flat">Unlocks ${unlocks.length}</span></div>
      </div>
      <div class="dw-body">
        ${sec('Why this one first',`<p>${dimName(gate)} is your weakest foundation, so it caps your readiness. Opportunities that depend on it stay blocked until it reaches level 3 of 5. Raising it is the single move that frees the most value.</p>`)}
        ${sec('What is holding it down, and the work to do',`<p>The ${dimName(gate)} level is set by its weakest facets. The specific questions still answered No, below, are the concrete tasks. Turn each into an action with an owner and a date.</p>${gapItems}`)}
        ${sec('What closing it unlocks',unlockList)}
        ${sec('What caps you next',`<p>${nextCap}</p>`)}
        ${sec('How you track it',`<p>As you complete each item, re-answer that question in step 2. ${dimName(gate)}, and your overall readiness, rise as the No answers turn to Yes.</p>`)}
      </div>
    </aside></div>`;
}
function renderDrawer(c){
  if(state.openFix) return fixBrief(c);
  if(!state.openOpp) return '';
  const o=c.inScope.find(x=>x.name===state.openOpp)||state.candidates.find(x=>x.name===state.openOpp);
  if(!o) return '';
  const d=oppBrief(o), st=oppStatus(o);
  const pill=st==='ready'?'<span class="dw-pill ok">Ready to start now</span>':st==='blocked'?`<span class="dw-pill no">Blocked by ${dimName(o.gate)}</span>`:'<span class="dw-pill pend">Not yet assessed</span>';
  const needTxt=st==='ready'?'This foundation is in place, so the opportunity can proceed.':st==='blocked'?'This foundation is not yet at a workable level, which is exactly what blocks it.':'This foundation has not been assessed yet.';
  const sec=(q,body)=>`<div class="dw-sec"><div class="dw-q">${q}</div><p>${body}</p></div>`;
  return `<div class="drawer-wrap"><div class="drawer-backdrop" data-close></div>
    <aside class="drawer" role="dialog" aria-label="Opportunity brief">
      <button class="drawer-close" data-close aria-label="Close">&#10005;</button>
      <div class="dw-head">
        <div class="dw-where">${domName(o.dom)} &middot; ${ARCH[o.arch]||o.arch}</div>
        <h2>${o.name}</h2>
        <div class="dw-pills">${pill}<span class="dw-pill flat">${QUADS[quadOf(o)]}</span><span class="dw-pill flat">Impact ${o.value} / Effort ${o.effort}</span></div>
      </div>
      <div class="dw-body">
        ${sec('What it is',d.what)}
        ${sec('Why it matters',d.why)}
        ${sec('How it works',d.how)}
        ${sec('Where it sits',domName(o.dom)+'. It draws on the data and processes of that function.')}
        ${sec('What it needs',dimName(o.gate)+'. '+needTxt)}
        ${sec('When you can start',whenText(o))}
        ${sec('Who owns it',d.who)}
        ${sec('How you would measure it',d.metric)}
        ${sec('A sensible first pilot',d.pilot)}
      </div>
    </aside></div>`;
}

function renderAll(){
  const c=compute();renderSidebar(c);
  const ma=document.getElementById('mainarea');
  if(state.view==='how'){
    ma.innerHTML=`<div class="howworks">${howItWorks()}</div>`;
  } else {
    ma.innerHTML=`<div class="workspace"><main class="work-left">${[stageScope,stageReadiness,stageOpportunity,stageGap,stageRoadmap][state.stage](c)}</main><aside class="work-right"><div class="live">${renderLive(c)}</div></aside></div>`;
  }
  renderHeaderName();
  renderPrintSheet(c);
  document.getElementById('drawer').innerHTML=renderDrawer(c);
  if(state.stage!==renderedStage||state.view!==renderedView){window.scrollTo({top:0});renderedStage=state.stage;renderedView=state.view;}
  bind();
}
function bind(){
  document.querySelectorAll('[data-dom]').forEach(ch=>{ch.onclick=()=>{const d=ch.dataset.dom;state.scope[d]=!state.scope[d];renderAll();};});
  document.querySelectorAll('[data-scope]').forEach(b=>{b.onclick=(e)=>{e.stopPropagation();const v=b.dataset.scope==='all';DOMAINS.forEach(d=>state.scope[d.k]=v);renderAll();};});
  document.querySelectorAll('.fnd-head[data-open]').forEach(b=>{b.onclick=()=>{const k=b.dataset.open;const before=b.getBoundingClientRect().top;state.openDim=(state.openDim===k?null:k);renderAll();const nb=document.querySelector('.fnd-head[data-open="'+k+'"]');if(nb){const after=nb.getBoundingClientRect().top;const dy=after-before;if(Math.abs(dy)>1)window.scrollBy(0,dy);}};});
  document.querySelectorAll('input[data-ev]').forEach(cb=>{cb.onchange=()=>{state.evidence[cb.dataset.ev][+cb.dataset.i]=cb.checked;renderAll();};});
  document.querySelectorAll('.lvlrow[data-lvl]').forEach(row=>{const set=()=>{state.readiness[row.dataset.lvl]=+row.dataset.l;renderAll();};row.onclick=set;row.onkeydown=(e)=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();set();}};});
  document.querySelectorAll('[data-rung]').forEach(b=>{b.onclick=()=>{state.rubric[b.dataset.rung][b.dataset.rf]=+b.dataset.rl;renderAll();};});
  document.querySelectorAll('[data-diag]').forEach(b=>{b.onclick=()=>{const dk=b.dataset.diag,fk=b.dataset.df,i=+b.dataset.di,val=+b.dataset.dv;const store=state.mode==='abridged'?state.abrDiag:state.diag;store[dk]=store[dk]||{};store[dk][fk]=store[dk][fk]||(state.mode==='abridged'?[null,null]:[null,null,null,null]);const arr=store[dk][fk];arr[i]=(arr[i]===val)?null:val;renderAll();};});
  document.querySelectorAll('[data-qnote]').forEach(inp=>{inp.oninput=()=>{const dk=inp.dataset.qnote,fk=inp.dataset.qf,i=+inp.dataset.qi;const store=state.mode==='abridged'?state.abrNote:state.qnote;store[dk]=store[dk]||{};store[dk][fk]=store[dk][fk]||(state.mode==='abridged'?[null,null]:[null,null,null,null]);store[dk][fk][i]=inp.value;};});
  document.querySelectorAll('.facet-note[data-note]').forEach(inp=>{inp.oninput=()=>{state.artifact[inp.dataset.notedim][inp.dataset.note]=inp.value;};});
  document.querySelectorAll('button[data-cal]').forEach(b=>{b.onclick=()=>{const cand=state.candidates.find(x=>x.name===b.dataset.cal);const f=b.dataset.f;cand[f]=Math.max(1,Math.min(5,cand[f]+(+b.dataset.d)));renderAll();};});
  const hf=document.getElementById('hf');if(hf){const t=()=>{state.hardFilter=!state.hardFilter;renderAll();};hf.onclick=t;hf.onkeydown=(e)=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();t();}};}
  const cs=document.getElementById('clientsel');if(cs)cs.onchange=(e)=>{loadClient(e.target.value);renderedStage=-1;state.view='step';state.stage=0;renderAll();};
  const nm=document.getElementById('clientname');if(nm)nm.oninput=(e)=>{state.clientName=e.target.value;renderHeaderName();};
  const bs=document.getElementById('btnSave');if(bs)bs.onclick=exportSave;
  const bl=document.getElementById('btnLoad');if(bl)bl.onclick=()=>{const f=document.getElementById('loadFile');if(f)f.click();};
  const lf=document.getElementById('loadFile');if(lf)lf.onchange=(e)=>{if(e.target.files&&e.target.files[0])importSave(e.target.files[0]);};
  const bx=document.getElementById('btnXlsx');if(bx)bx.onclick=exportExcel;
  const br=document.getElementById('btnReport');if(br)br.onclick=printReport;
  const ft=document.getElementById('facToggle');if(ft)ft.onchange=()=>{state.facilitator=ft.checked;renderAll();};
  document.querySelectorAll('[data-mode]').forEach(b=>{b.onclick=()=>{state.mode=b.dataset.mode;renderAll();};});
  document.querySelectorAll('[data-cx]').forEach(el=>{const h=()=>{state.context=state.context||{};state.context[el.dataset.cx]=el.value;};el.oninput=h;el.onchange=h;});
  const rb=document.getElementById('resetbtn');if(rb)rb.onclick=()=>{loadClient(state.client);renderAll();};
  document.querySelectorAll('.backcue-btn').forEach(b=>{b.onclick=()=>{state.view='step';state.stage=1;renderAll();};});
  document.querySelectorAll('.side-item[data-step]').forEach(b=>{b.onclick=()=>{state.view='step';state.stage=+b.dataset.step;renderAll();};});
  document.querySelectorAll('[data-view]').forEach(b=>{b.onclick=()=>{state.view=b.dataset.view;renderAll();};});
  document.querySelectorAll('[data-quad]').forEach(b=>{b.onclick=()=>{const q=b.dataset.quad;state.quadFilter=(q==='clear'||state.quadFilter===q)?null:q;renderAll();};});
  document.querySelectorAll('[data-opp]').forEach(el=>{el.onclick=()=>{state.openOpp=el.getAttribute('data-opp');state.openFix=null;renderAll();};});
  document.querySelectorAll('[data-fix]').forEach(el=>{el.onclick=()=>{state.openFix=el.getAttribute('data-fix');state.openOpp=null;renderAll();};});
  document.querySelectorAll('[data-close]').forEach(el=>{el.onclick=()=>{state.openOpp=null;state.openFix=null;renderAll();};});
}
renderAll();
window.addEventListener('beforeprint',()=>{try{renderReport(compute());}catch(e){}});
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&(state.openOpp||state.openFix)){state.openOpp=null;state.openFix=null;renderAll();}});
</script>
</body>
</html>
